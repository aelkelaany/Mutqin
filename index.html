function Expenses({data,language,onSaveExpense,onDeleteExpense,onSaveCategory,onDeleteCategory,onSaveBudget,onDeleteBudget,toast}){
  const[expModal,setExpModal]=useState(null);
  const[catModal,setCatModal]=useState(null);
  const[budModal,setBudModal]=useState(null);
  const[recurModal,setRecurModal]=useState(false);
  const[chartTab,setChartTab]=useState('pie');
  const[dateRange,setDateRange]=useState('month');
  const[customFrom,setCustomFrom]=useState('');
  const[customTo,setCustomTo]=useState('');
  const[expSearch,setExpSearch]=useState('');
  const[mgtMode,setMgtMode]=useState(false);
  const[rateData,setRateData]=useState(()=>getStoredRates());
  const[rateLoading,setRateLoading]=useState(false);
  const[selBudget,setSelBudget]=useState(null);
  const[expandedCats,setExpandedCats]=useState({});
  const[budMenuOpen,setBudMenuOpen]=useState(false);

  const baseCur=rateData.baseCurrency||'SAR';
  const rates=rateData.rates||DEF_RATES;
  const baseCurInfo=CURRENCIES.find(c=>c.code===baseCur)||CURRENCIES[0];

  // Auto-fetch rates on first load if never fetched
  useEffect(()=>{if(!rateData.updated){fetchLiveRates().then(d=>setRateData(d));}},[]);

  const refreshRates=useCallback(async()=>{setRateLoading(true);const d=await fetchLiveRates();setRateData(d);setRateLoading(false);toast(T('تم تحديث الأسعار 💱','Rates updated 💱',language));},[toast,language]);
  const setBaseCurrency=useCallback((code)=>{const d={...rateData,baseCurrency:code};saveRates(d);setRateData(d);},[rateData]);
  const setManualRate=useCallback((code,val)=>{const mo={...(rateData.manualOverrides||{}), [code]:parseFloat(val)};const nr={...rateData.rates,[code]:parseFloat(val)};const d={...rateData,rates:nr,manualOverrides:mo};saveRates(d);setRateData(d);},[rateData]);
  const clearManualRate=useCallback((code)=>{const mo={...(rateData.manualOverrides||{})};delete mo[code];const d={...rateData,manualOverrides:mo};saveRates(d);setRateData(d);refreshRates();},[rateData,refreshRates]);

  const toBase=useCallback((amount,fromCur)=>convertAmount(amount,fromCur,baseCur,rates),[baseCur,rates]);
  const toBudgetCur=useCallback((amount,fromCur,budCur)=>convertAmount(amount,fromCur,budCur,rates),[rates]);
  // Use saved rates for budget calculations (accurate historical rates)
  const expToBudget=useCallback((e,budCur)=>convertWithSavedRate(e,budCur,rates),[rates]);
  const expRate=useCallback((e,budCur)=>getExpenseRate(e,budCur,rates),[rates]);

  const cats=data.categories||[];
  const allExpRaw=data.expenses||[];
  const budgets=data.budgets||[];
  const closedBudgetIds=useMemo(()=>new Set(budgets.filter(b=>b.closed).map(b=>b.id)),[budgets]);
  const hiddenFromReportIds=useMemo(()=>new Set(budgets.filter(b=>b.closed||b.includeInReports===false).map(b=>b.id)),[budgets]);
  // allExp: ALL expenses including closed-budget ones — shown in list/search so user can edit/delete them
  const allExp=useMemo(()=>allExpRaw,[allExpRaw]);
  // analyticsExp: expenses only (no income), for charts/totals — excludes closed + includeInReports=false
  const analyticsExp=useMemo(()=>allExpRaw.filter(e=>e.txType!=='income'&&(!e.budgetId||!hiddenFromReportIds.has(e.budgetId))),[allExpRaw,hiddenFromReportIds]);

  const filtered=useMemo(()=>{
    const now=new Date();let from,to;
    if(dateRange==='week'){from=new Date(now);from.setDate(from.getDate()-7);to=now;}
    else if(dateRange==='month'){from=new Date(now.getFullYear(),now.getMonth(),1);to=now;}
    else if(dateRange==='year'){from=new Date(now.getFullYear(),0,1);to=now;}
    else if(dateRange==='custom'&&customFrom&&customTo){from=new Date(customFrom);to=new Date(customTo);to.setHours(23,59,59);}
    else{from=new Date(0);to=now;}
    return allExp.filter(e=>{const d=new Date(e.date);return d>=from&&d<=to;}).filter(e=>!expSearch||((e.title||'').toLowerCase().includes(expSearch.toLowerCase()))).sort((a,b)=>new Date(b.date)-new Date(a.date));
  },[allExp,dateRange,customFrom,customTo,expSearch]);

  // analyticsFiltered: same date range as filtered but from analyticsExp (for charts/totals)
  const analyticsFiltered=useMemo(()=>{
    const now=new Date();let from,to;
    if(dateRange==='week'){from=new Date(now);from.setDate(from.getDate()-7);to=now;}
    else if(dateRange==='month'){from=new Date(now.getFullYear(),now.getMonth(),1);to=now;}
    else if(dateRange==='year'){from=new Date(now.getFullYear(),0,1);to=now;}
    else if(dateRange==='custom'&&customFrom&&customTo){from=new Date(customFrom);to=new Date(customTo);to.setHours(23,59,59);}
    else{from=new Date(0);to=now;}
    return analyticsExp.filter(e=>{const d=new Date(e.date);return d>=from&&d<=to;});
  },[analyticsExp,dateRange,customFrom,customTo]);

  const totalFiltered=useMemo(()=>analyticsFiltered.reduce((s,e)=>s+toBase(e.amount,e.currency),0),[analyticsFiltered,toBase]);
  const curMonth=localDS().slice(0,7);
  const monthTotal=useMemo(()=>analyticsExp.filter(e=>e.date.startsWith(curMonth)).reduce((s,e)=>s+toBase(e.amount,e.currency),0),[analyticsExp,curMonth,toBase]);

  const getCatName=(id)=>{const c=cats.find(c=>c.id===id);return c?(language==='ar'?c.name:c.nameEn):'❓';};
  const getCat=(id)=>cats.find(c=>c.id===id)||{icon:'❓',color:'#666',name:'أخرى',nameEn:'Other'};
  const getBudgetSpent=useCallback((bid)=>{const b=budgets.find(x=>x.id===bid);const bCur=b?b.currency:baseCur;return allExpRaw.filter(e=>e.budgetId===bid&&e.txType!=='income').reduce((s,e)=>s+expToBudget(e,bCur),0);},[allExpRaw,budgets,baseCur,expToBudget]);
  const getBudgetIncome=useCallback((bid)=>{const b=budgets.find(x=>x.id===bid);const bCur=b?b.currency:baseCur;return allExpRaw.filter(e=>e.budgetId===bid&&e.txType==='income').reduce((s,e)=>s+expToBudget(e,bCur),0);},[allExpRaw,budgets,baseCur,expToBudget]);

  // Group by date
  const grouped=useMemo(()=>{const g={};filtered.forEach(e=>{const d=e.date;if(!g[d])g[d]=[];g[d].push(e);});return Object.entries(g);},[filtered]);

  const chartTabs=[{id:'pie',icon:'🥧',l:T('دائري','Pie',language)},{id:'trend',icon:'📈',l:T('خطي','Trend',language)},{id:'bars',icon:'📊',l:T('شهري','Monthly',language)},{id:'table',icon:'📋',l:T('جدول','Table',language)},{id:'budgets',icon:'🎯',l:T('ميزانيات','Budgets',language)},{id:'smart',icon:'🧠',l:T('تحليل','Analysis',language)}];
  const dateRanges=[{id:'week',l:T('أسبوع','Week',language)},{id:'month',l:T('شهر','Month',language)},{id:'year',l:T('سنة','Year',language)},{id:'custom',l:T('مخصص','Custom',language)}];

        const existingTitles=allExpRaw.filter(e=>e.date.startsWith(today.slice(0,7))).map(e=>e.title.trim().toLowerCase());

          imported++;
        }

        toast(imported>0
          ?T(`✅ تم حفظ الميزانية واستيراد ${imported} مصروف ثابت`,`✅ Budget saved + ${imported} recurring expenses imported`,language)

        );

// ========== NOTES / MYFAKRA ==========
const NOTE_COLORS_DARK=['#1E2744','#2D1B1B','#1B2D1B','#1B1B2D','#2D2B1B','#1B2D2D','#2D1B2D','#2B2D1B'];
const NOTE_COLORS_LIGHT=['#D8DDE8','#F5DDD9','#D5EADA','#D5E5F2','#F0E7C8','#D1EEF1','#E5D5E8','#DDE8D6'];
function getNoteColors(isDark){return isDark?NOTE_COLORS_DARK:NOTE_COLORS_LIGHT;}
function mapNoteColor(storedColor,isDark){
  const darkIdx=NOTE_COLORS_DARK.indexOf(storedColor);
  const lightIdx=NOTE_COLORS_LIGHT.indexOf(storedColor);
  if(isDark){return darkIdx>=0?storedColor:lightIdx>=0?NOTE_COLORS_DARK[lightIdx]:storedColor;}
  else{return lightIdx>=0?storedColor:darkIdx>=0?NOTE_COLORS_LIGHT[darkIdx]:storedColor;}
}
const NOTE_TYPES=[
  {id:'text',icon:'📝',l_ar:'نص',l_en:'Text'},
  {id:'checklist',icon:'✅',l_ar:'قائمة',l_en:'Checklist'},
  {id:'link',icon:'🔗',l_ar:'رابط',l_en:'Link'},
  {id:'idea',icon:'💡',l_ar:'فكرة',l_en:'Idea'}
];

// Reminder checker
function checkReminders(notes,language,toast){
  const now=new Date();
  notes.forEach(n=>{
    if(n.reminder&&!n.reminderFired){
      const rd=new Date(n.reminder);
      if(rd<=now){
        if('Notification' in window&&Notification.permission==='granted'){
          new Notification(n.title||T('تذكير','Reminder',language),{body:n.content?.slice(0,100)||'',icon:'📓'});
        }
        toast(`⏰ ${n.title||T('تذكير','Reminder',language)}`);
        n._shouldFire=true;
      }
    }
  });
  return notes.filter(n=>n._shouldFire).map(n=>({...n,reminderFired:true,_shouldFire:undefined}));
}

function NoteModal({note,language,onSave,onDelete,onClose,isDark}){
  const isE=note&&note.id&&!note._isNew;
  const nc=getNoteColors(isDark);
  const[form,setForm]=useState(()=>isE?{...note,checklist:note.checklist||[]}:{
    title:'',content:'',type:'text',color:nc[0],pinned:false,
    checklist:[],linkUrl:'',linkDesc:'',
    reminder:'',reminderFired:false
  });
  const f=(k,v)=>setForm(p=>({...p,[k]:v}));

  // Checklist management
  const addCheckItem=()=>f('checklist',[...form.checklist,{id:uid(),text:'',done:false}]);
  const updateCheckItem=(id,key,val)=>f('checklist',form.checklist.map(c=>c.id===id?{...c,[key]:val}:c));
  const removeCheckItem=(id)=>f('checklist',form.checklist.filter(c=>c.id!==id));

  const save=()=>{
    if(!form.title.trim()&&!form.content?.trim()&&!form.checklist.length&&!form.linkUrl)return;
    onSave({...form,id:form.id||uid(),updatedAt:new Date().toISOString(),createdAt:form.createdAt||new Date().toISOString()});
  };

  return(<div className="overlay"><div className="modal" onClick={e=>e.stopPropagation()} style={{maxWidth:440,maxHeight:'92dvh',overflow:'auto'}}>
    <div style={{padding:'16px 20px',borderBottom:'1px solid var(--border)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
      <h3 style={{fontSize:16,fontWeight:800}}>{isE?T('تعديل','Edit',language):T('ملاحظة جديدة','New Note',language)}</h3>
      <div style={{display:'flex',gap:6}}>
        <button className={`btn btn-ghost btn-xs ${form.pinned?'btn-gold':''}`} onClick={()=>f('pinned',!form.pinned)}>📌</button>
        <button className="btn btn-ghost btn-icon-sm" onClick={onClose}>✕</button>
      </div>
    </div>
    <div style={{padding:16,display:'flex',flexDirection:'column',gap:12}}>

      <div className="note-type-tabs">{NOTE_TYPES.map(t=>(<div key={t.id} className={`exp-tab ${form.type===t.id?'active':''}`} onClick={()=>f('type',t.id)}>{t.icon} {language==='ar'?t.l_ar:t.l_en}</div>))}</div>

          <div onClick={()=>updateCheckItem(c.id,'done',!c.done)} style={{width:22,height:22,borderRadius:6,border:'2px solid var(--border)',background:c.done?'var(--lime)':'transparent',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,color:'white',flexShrink:0}}>{c.done&&'✓'}</div>
          <input className="field" value={c.text} onChange={e=>updateCheckItem(c.id,'text',e.target.value)} placeholder={T('عنصر...','Item...',language)} style={{flex:1,fontSize:13,textDecoration:c.done?'line-through':'none'}}/>
          <span style={{cursor:'pointer',fontSize:12,color:'var(--coral)'}} onClick={()=>removeCheckItem(c.id)}>✕</span>
        </div>))}
        <button className="btn btn-ghost btn-sm" onClick={addCheckItem} style={{alignSelf:'flex-start'}}>+ {T('عنصر جديد','New item',language)}</button>

      </div>}

      <div><label style={{fontSize:11,fontWeight:700,color:'var(--text2)',marginBottom:4,display:'block'}}>🎨 {T('اللون','Color',language)}</label>

      </div>

      <div><label style={{fontSize:11,fontWeight:700,color:'var(--text2)',marginBottom:4,display:'block'}}>⏰ {T('تذكير (اختياري)','Reminder (optional)',language)}</label>
        <input className="field" type="datetime-local" value={form.reminder||''} onChange={e=>f('reminder',e.target.value)} style={{fontSize:12}}/>
        {form.reminder&&<button className="btn btn-ghost btn-xs" style={{marginTop:4}} onClick={()=>{f('reminder','');f('reminderFired',false);}}>✕ {T('إلغاء التذكير','Remove reminder',language)}</button>}
      </div>

    <div style={{padding:'14px 20px',borderTop:'1px solid var(--border)',display:'flex',gap:10,justifyContent:'flex-end'}}>

      <button className="btn btn-teal" onClick={save}>📓 {T('حفظ','Save',language)}</button>
    </div>
  </div></div>);
}

function Notes({data,language,onSaveNote,onDeleteNote,toast,isDark}){
  const[noteModal,setNoteModal]=useState(null);
  const[viewMode,setViewMode]=useState('grid');
  const[noteSearch,setNoteSearch]=useState('');
  const[typeFilter,setTypeFilter]=useState('all');

  const allNotes=data.notes||[];

  // Request notification permission
  useEffect(()=>{if('Notification' in window&&Notification.permission==='default'){Notification.requestPermission();}},[]);

  // Check reminders every 30s
  useEffect(()=>{
    const check=()=>{const fired=checkReminders(allNotes,language,toast);fired.forEach(n=>onSaveNote(n));};
    check();
    const iv=setInterval(check,30000);
    return()=>clearInterval(iv);
  },[allNotes,language,toast,onSaveNote]);

  const filtered=useMemo(()=>{
    let notes=allNotes;
    if(typeFilter!=='all')notes=notes.filter(n=>n.type===typeFilter);
    if(noteSearch){const q=noteSearch.toLowerCase();notes=notes.filter(n=>(n.title||'').toLowerCase().includes(q)||(n.content||'').toLowerCase().includes(q)||(n.linkUrl||'').toLowerCase().includes(q)||(n.checklist||[]).some(c=>c.text.toLowerCase().includes(q)));}
    const pinned=notes.filter(n=>n.pinned).sort((a,b)=>new Date(b.updatedAt||b.createdAt)-new Date(a.updatedAt||a.createdAt));
    const rest=notes.filter(n=>!n.pinned).sort((a,b)=>new Date(b.updatedAt||b.createdAt)-new Date(a.updatedAt||a.createdAt));
    return{pinned,rest};
  },[allNotes,typeFilter,noteSearch]);

  const renderNoteCard=(n)=>{
    const typeInfo=NOTE_TYPES.find(t=>t.id===n.type)||NOTE_TYPES[0];
    const hasReminder=n.reminder&&!n.reminderFired;
    const isPastReminder=n.reminder&&new Date(n.reminder)<new Date()&&!n.reminderFired;
    const checkDone=n.checklist?n.checklist.filter(c=>c.done).length:0;
    const checkTotal=n.checklist?n.checklist.length:0;

    if(viewMode==='list'){
      return(<div key={n.id} className="note-card" style={{background:mapNoteColor(n.color,isDark)||getNoteColors(isDark)[0],borderColor:n.pinned?'var(--gold)':'var(--border)'}} onClick={()=>setNoteModal(n)}>
        {n.pinned&&<span style={{fontSize:14,marginLeft:4,marginRight:4}}>📌</span>}
        <span style={{fontSize:20,flexShrink:0}}>{typeInfo.icon}</span>
        <div style={{flex:1,minWidth:0}}>
          <div className="note-card-title">{n.title||T('بدون عنوان','Untitled',language)}</div>
          <div className="note-card-body">{n.type==='checklist'?`${checkDone}/${checkTotal} ${T('مكتمل','done',language)}`:n.type==='link'?n.linkUrl:(n.content||'').slice(0,80)}</div>
        </div>
        <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:4,flexShrink:0}}>
          {hasReminder&&<span className="note-reminder-badge">⏰ {new Date(n.reminder).toLocaleDateString(language==='ar'?'ar-SA':'en-US',{day:'numeric',month:'short'})}</span>}
          <span style={{fontSize:9,color:'var(--text2)'}}>{new Date(n.updatedAt||n.createdAt).toLocaleDateString(language==='ar'?'ar-SA':'en-US',{day:'numeric',month:'short'})}</span>
        </div>
      </div>);
    }

    return(<div key={n.id} className={`note-card ${n.pinned?'pinned':''}`} style={{background:mapNoteColor(n.color,isDark)||getNoteColors(isDark)[0],borderColor:n.pinned?'var(--gold)':'var(--border)'}} onClick={()=>setNoteModal(n)}>
      {n.pinned&&<span className="note-pin">📌</span>}
      <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:4}}>
        <span style={{fontSize:16}}>{typeInfo.icon}</span>
        <span className="note-card-title" style={{marginBottom:0,flex:1}}>{n.title||T('بدون عنوان','Untitled',language)}</span>
      </div>

      {n.type==='text'||n.type==='idea'?<div className="note-card-body">{n.content}</div>:null}

      {n.type==='checklist'&&<div style={{marginTop:2}}>
        {(n.checklist||[]).slice(0,4).map(c=>(<div key={c.id} className={`note-check-item ${c.done?'done':''}`}><span>{c.done?'☑':'☐'}</span><span>{c.text}</span></div>))}
        {(n.checklist||[]).length>4&&<div style={{fontSize:10,color:'var(--text2)',marginTop:2}}>+{n.checklist.length-4} {T('أخرى','more',language)}</div>}
      </div>}

      {n.type==='link'&&<div><div className="note-card-body" style={{color:'var(--teal)',fontSize:10,wordBreak:'break-all'}}>{n.linkUrl}</div>{n.linkDesc&&<div className="note-card-body" style={{marginTop:4}}>{n.linkDesc}</div>}</div>}

      <div className="note-card-footer">
        <span>{new Date(n.updatedAt||n.createdAt).toLocaleDateString(language==='ar'?'ar-SA':'en-US',{day:'numeric',month:'short'})}</span>
        <div style={{display:'flex',gap:4,alignItems:'center'}}>
          {n.type==='checklist'&&<span style={{fontSize:10,fontWeight:700,color:checkDone===checkTotal&&checkTotal>0?'var(--lime)':'var(--text2)'}}>{checkDone}/{checkTotal}</span>}
          {hasReminder&&<span className="note-reminder-badge">⏰</span>}
        </div>
      </div>
    </div>);
  };

  const filters=[{id:'all',icon:'📓',l:T('الكل','All',language)},...NOTE_TYPES.map(t=>({id:t.id,icon:t.icon,l:language==='ar'?t.l_ar:t.l_en}))];

  return(<div style={{display:'flex',flexDirection:'column',gap:14}}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
      <h2 style={{fontSize:22,fontWeight:900}}>📓 {T('مفكرتي','My Notes',language)}</h2>
      <div style={{display:'flex',gap:6}}>
        <button className="btn btn-ghost btn-sm" onClick={()=>setViewMode(v=>v==='grid'?'list':'grid')}>{viewMode==='grid'?'☰':'▦'}</button>
        <button className="btn btn-teal btn-sm" onClick={()=>setNoteModal({_isNew:true})}>+ {T('جديد','New',language)}</button>
      </div>
    </div>

    <div className="search-wrap"><span className="search-icon">🔍</span><input className="field" value={noteSearch} onChange={e=>setNoteSearch(e.target.value)} placeholder={T('ابحث في الملاحظات...','Search notes...',language)} style={{paddingRight:language==='ar'?36:12,paddingLeft:language!=='ar'?36:12}}/>{noteSearch&&<span className="search-clear" onClick={()=>setNoteSearch('')}>✕</span>}</div>

    <div className="note-type-tabs">{filters.map(f=>(<div key={f.id} className={`exp-tab ${typeFilter===f.id?'active':''}`} onClick={()=>setTypeFilter(f.id)}>{f.icon} {f.l}</div>))}</div>

    {filtered.pinned.length>0&&<div>
      <h3 style={{fontSize:13,fontWeight:700,color:'var(--gold)',marginBottom:8}}>📌 {T('المثبتة','Pinned',language)}</h3>
      <div className={viewMode==='grid'?'notes-grid':'notes-list'} style={viewMode==='list'?{display:'flex',flexDirection:'column',gap:8}:{}}>{filtered.pinned.map(renderNoteCard)}</div>
    </div>}

    <div>
      {filtered.pinned.length>0&&filtered.rest.length>0&&<h3 style={{fontSize:13,fontWeight:700,color:'var(--text2)',marginBottom:8}}>{T('الأخرى','Others',language)}</h3>}
      {filtered.rest.length>0?
        <div className={viewMode==='grid'?'notes-grid':'notes-list'} style={viewMode==='list'?{display:'flex',flexDirection:'column',gap:8}:{}}>{filtered.rest.map(renderNoteCard)}</div>:
        !filtered.pinned.length&&<div style={{textAlign:'center',padding:40,color:'var(--text2)'}}><div style={{fontSize:48}}>📓</div><p style={{fontSize:14,marginTop:8}}>{T('لا ملاحظات — أضف أول ملاحظة!','No notes — add your first note!',language)}</p></div>
      }
    </div>

    {noteModal&&<NoteModal note={noteModal} language={language} isDark={isDark} onSave={n=>{onSaveNote(n);setNoteModal(null);}} onDelete={noteModal.id&&!noteModal._isNew?()=>{onDeleteNote(noteModal);setNoteModal(null);}:null} onClose={()=>setNoteModal(null)}/>}
  </div>);
}

function Timeline({data,language}){const[tlSort,setTlSort]=useState('asc');const items=useMemo(()=>{const r=[];(data.goals||[]).forEach(g=>{if(g.startDate)r.push({...g,_type:'gstart',_date:g.startDate,_c:g.color});if(g.endDate)r.push({...g,_type:'gend',_date:g.endDate,_c:g.color});});(data.milestones||[]).forEach(m=>{if(m.dueDate)r.push({...m,_type:'ms',_date:m.dueDate,_c:'#FECA57'});});(data.tasks||[]).forEach(t=>{if(t.dueDate)r.push({...t,_type:'task',_date:t.dueDate,_c:'#00D2D3'});});(data.quickTasks||[]).forEach(q=>{if(q.dueDate)r.push({...q,_type:'qt',_date:q.dueDate,_c:'#5F7FFF'});});(data.meetings||[]).forEach(m=>{if(m.meetingDate)r.push({...m,_type:'meet',_date:m.meetingDate,_c:'#FF9FF3'});});r.sort((a,b)=>tlSort==='asc'?new Date(a._date)-new Date(b._date):new Date(b._date)-new Date(a._date));return r;},[data,tlSort]);const lb={gstart:{i:'🚀',l:T('بداية هدف','Goal Start',language)},gend:{i:'🏁',l:T('نهاية هدف','Goal End',language)},ms:{i:'📍',l:T('مرحلة','Milestone',language)},task:{i:'📝',l:T('مهمة','Task',language)},qt:{i:'✅',l:T('سريعة','Quick',language)},meet:{i:'👥',l:T('اجتماع','Meeting',language)}};const tStr=localDS();
return(<div style={{display:'flex',flexDirection:'column',gap:16}}><div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}><h2 style={{fontSize:22,fontWeight:900}}>📊 {T('الجدول الزمني','Timeline',language)}</h2><SortBtn sort={tlSort} onToggle={()=>setTlSort(s=>s==='asc'?'desc':'asc')} language={language}/></div>{!items.length?(<div className="card" style={{padding:50,textAlign:'center'}}><div style={{fontSize:56,marginBottom:16}}>⏳</div><p style={{color:'var(--text2)',fontWeight:600}}>{T('لا توجد عناصر','No items',language)}</p></div>):(<div style={{position:'relative',paddingRight:language==='ar'?28:0,paddingLeft:language!=='ar'?28:0}}><div style={{position:'absolute',top:0,bottom:0,width:3,background:'linear-gradient(180deg,var(--coral),var(--teal),var(--gold))',borderRadius:4,right:language==='ar'?11:'auto',left:language!=='ar'?11:'auto'}}/>{items.map((it,i)=>{const ds=it._date.split('T')[0],past=ds<tStr,isT=ds===tStr;const info=lb[it._type];const clr=it._c;return(<div key={i} style={{position:'relative',marginBottom:14,opacity:past?.5:1}}><div style={{position:'absolute',width:14,height:14,borderRadius:'50%',background:isT?'#FECA57':clr,right:language==='ar'?5:'auto',left:language!=='ar'?5:'auto',top:18,border:'3px solid var(--bg2)',zIndex:1,boxShadow:isT?'0 0 10px var(--gold-g)':'none'}}/><div className="card" style={{marginRight:language==='ar'?22:0,marginLeft:language!=='ar'?22:0,padding:14}}><div style={{display:'flex',alignItems:'center',gap:10}}><span style={{fontSize:24}}>{it.icon||info.i}</span><div style={{flex:1,minWidth:0}}><div style={{fontWeight:700,fontSize:14}}>{it.title}</div><div style={{display:'flex',gap:6,flexWrap:'wrap',marginTop:4,alignItems:'center'}}><span className="badge" style={{background:`${clr}22`,color:clr}}>{info.i} {info.l}</span><span style={{fontSize:11,color:'var(--text2)',fontWeight:600}}>{new Date(it._date).toLocaleDateString(language==='ar'?'ar-SA':'en-US',{month:'short',day:'numeric',year:'numeric'})}</span>{it._type==='meet'&&it.location&&<span style={{fontSize:11,color:'var(--text2)'}}>📍 {it.location}</span>}</div></div>{isT&&<span className="badge" style={{background:'var(--gold-g)',color:'var(--gold)',animation:'pulse 2s infinite'}}>🔥 {T('اليوم','Today',language)}</span>}</div></div></div>);})}</div>)}</div>);}

// ========== HEALTH TAB ==========
function Health({data,language,onSaveHealth,onDeleteHealth,toast}){
  const logs=useMemo(()=>(data.healthLogs||[]).sort((a,b)=>b.date.localeCompare(a.date)),[data.healthLogs]);
  const[logModal,setLogModal]=useState(null);
  const[profileModal,setProfileModal]=useState(false);
  const[chartTab,setChartTab]=useState('weight');

  // Body Profile (persisted in localStorage)
  const defProfile={height:'',targetWeight:'',age:'',gender:'male',waist:'',bodyFat:''};
  const[profile,setProfile]=useState(()=>{try{return{...defProfile,...JSON.parse(localStorage.getItem('gt-health-profile')||'{}')};}catch(e){return defProfile;}});
  const saveProfile=(p)=>{setProfile(p);localStorage.setItem('gt-health-profile',JSON.stringify(p));};

  const today=localDS();
  const todayLog=logs.find(l=>l.date===today);

  // Helpers
  const bmi=(w,h)=>{if(!w||!h)return null;const hm=h/100;return(w/(hm*hm)).toFixed(1);};
  const bmiLabel=(v,lang)=>{if(!v)return'';const n=parseFloat(v);if(n<18.5)return lang==='ar'?'نحافة':'Underweight';if(n<25)return lang==='ar'?'طبيعي':'Normal';if(n<30)return lang==='ar'?'زيادة وزن':'Overweight';return lang==='ar'?'سمنة':'Obese';};
  const bmiColor=(v)=>{if(!v)return'var(--text2)';const n=parseFloat(v);if(n<18.5)return'#54A0FF';if(n<25)return'var(--lime)';if(n<30)return'var(--gold)';return'var(--coral)';};
  const fmtH=(mins)=>{if(!mins)return'—';const h=Math.floor(mins/60),m=mins%60;return h>0?`${h}${T('س','h',language)} ${m>0?m+T('د','m',language):''}`:m+T('د','m',language);};

  const latestWeight=logs.find(l=>l.weight)?.weight;
  const currentBMI=latestWeight&&profile.height?bmi(latestWeight,parseFloat(profile.height)):null;

  // Chart data
  const last7=useMemo(()=>{const d=[];for(let i=6;i>=0;i--){const dt=new Date();dt.setDate(dt.getDate()-i);const ds=localDS(dt);const log=logs.find(l=>l.date===ds);d.push({date:ds,day:dt.toLocaleDateString(language==='ar'?'ar-SA':'en-US',{weekday:'short'}),weight:log?.weight||null,steps:log?.steps||0,sleep:log?.sleepMinutes||0});}return d;},[logs,language]);

  const last30w=useMemo(()=>{const d=[];for(let i=29;i>=0;i--){const dt=new Date();dt.setDate(dt.getDate()-i);const ds=localDS(dt);const log=logs.find(l=>l.date===ds);if(log?.weight)d.push({date:ds,day:dt.toLocaleDateString(language==='ar'?'ar-SA':'en-US',{day:'numeric',month:'short'}),weight:log.weight});}return d;},[logs,language]);

  // Weight change
  const weightChange=useMemo(()=>{const wLogs=logs.filter(l=>l.weight);if(wLogs.length<2)return null;return(wLogs[0].weight-wLogs[1].weight).toFixed(1);},[logs]);

  // Averages
  const avgSleep7=last7.filter(d=>d.sleep>0);
  const avgSleepVal=avgSleep7.length?Math.round(avgSleep7.reduce((s,d)=>s+d.sleep,0)/avgSleep7.length):0;
  const totalSteps7=last7.reduce((s,d)=>s+(d.steps||0),0);

  // ---- BMI GAUGE ----
  const BMIGauge=({value})=>{
    if(!value)return null;
    const v=parseFloat(value);const min=15,max=40;
    const pct=Math.max(0,Math.min(100,((v-min)/(max-min))*100));
    const zones=[{l:0,r:14,c:'#54A0FF',lb:T('نحافة','Under',language)},{l:14,r:40,c:'var(--lime)',lb:T('طبيعي','Normal',language)},{l:40,r:60,c:'var(--gold)',lb:T('زيادة','Over',language)},{l:60,r:100,c:'var(--coral)',lb:T('سمنة','Obese',language)}];
    return(<div style={{position:'relative',height:32,borderRadius:16,overflow:'hidden',background:'var(--bg3)',marginTop:8}}>
      {zones.map((z,i)=>(<div key={i} style={{position:'absolute',left:z.l+'%',width:(z.r-z.l)+'%',height:'100%',background:z.c+'33'}}/>))}
      <div style={{position:'absolute',left:`calc(${pct}% - 2px)`,top:0,width:4,height:'100%',background:bmiColor(value),borderRadius:2,boxShadow:`0 0 8px ${bmiColor(value)}`}}/>
      <div style={{position:'absolute',left:`calc(${pct}% - 16px)`,top:-20,fontSize:11,fontWeight:800,color:bmiColor(value)}}>{value}</div>
      <div style={{display:'flex',height:'100%'}}>
        {zones.map((z,i)=>(<div key={i} style={{flex:z.r-z.l,display:'flex',alignItems:'center',justifyContent:'center',fontSize:9,fontWeight:700,color:z.c,opacity:.8}}>{z.lb}</div>))}
      </div>
    </div>);
  };

  // ---- PROFILE MODAL ----
  const ProfileModal=()=>{
    const[f,setF]=useState({...profile});
    const u=(k,v)=>setF(p=>({...p,[k]:v}));
    return(<div className="overlay"><div className="modal" onClick={e=>e.stopPropagation()} style={{maxWidth:420,maxHeight:'90dvh',overflow:'auto'}}>
      <div style={{padding:'20px 24px',borderBottom:'1px solid var(--border)'}}><h3 style={{fontSize:16,fontWeight:800}}>👤 {T('ملف الجسم','Body Profile',language)}</h3></div>
      <div style={{padding:20,display:'flex',flexDirection:'column',gap:14}}>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
          <div><label className="label">📏 {T('الطول (سم)','Height (cm)',language)}</label><input className="field" type="number" value={f.height||''} onChange={e=>u('height',e.target.value)} placeholder="175"/></div>
          <div><label className="label">🎯 {T('الوزن المستهدف','Target Weight',language)}</label><input className="field" type="number" step="0.1" value={f.targetWeight||''} onChange={e=>u('targetWeight',e.target.value)} placeholder="70"/></div>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
          <div><label className="label">🎂 {T('العمر','Age',language)}</label><input className="field" type="number" value={f.age||''} onChange={e=>u('age',e.target.value)} placeholder="30"/></div>
          <div><label className="label">👤 {T('الجنس','Gender',language)}</label><select className="field" value={f.gender||'male'} onChange={e=>u('gender',e.target.value)}><option value="male">{T('ذكر','Male',language)}</option><option value="female">{T('أنثى','Female',language)}</option></select></div>
        </div>
        <div style={{fontSize:13,fontWeight:700,color:'var(--teal)',marginTop:8}}>📐 {T('قياسات الجسم (شهرية)','Body Measurements (monthly)',language)}</div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
          <div><label className="label">📐 {T('محيط الخصر (سم)','Waist (cm)',language)}</label><input className="field" type="number" step="0.5" value={f.waist||''} onChange={e=>u('waist',e.target.value)} placeholder="85"/></div>
          <div><label className="label">📐 {T('نسبة الدهون %','Body Fat %',language)}</label><input className="field" type="number" step="0.1" value={f.bodyFat||''} onChange={e=>u('bodyFat',e.target.value)} placeholder="20"/></div>
        </div>
      </div>
      <div style={{padding:'16px 24px',borderTop:'1px solid var(--border)',display:'flex',gap:10,justifyContent:'flex-end'}}>
        <button className="btn btn-ghost" onClick={()=>setProfileModal(false)}>{T('إلغاء','Cancel',language)}</button>
        <button className="btn btn-teal" onClick={()=>{saveProfile(f);setProfileModal(false);toast(T('تم حفظ الملف 👤','Profile saved 👤',language));}}>💾 {T('حفظ','Save',language)}</button>
      </div>
    </div></div>);
  };

  // ---- DAILY LOG MODAL ----
  const DailyLogModal=({log,onClose})=>{
    const isE=log&&log.id&&!log._isNew;
    const[f,setF]=useState(()=>isE?{...log}:{date:log?.date||today,weight:'',sleepMinutes:'',steps:'',fastingHours:'',workoutMinutes:'',workoutType:'',caloriesIn:'',caloriesOut:'',bpSystolic:'',bpDiastolic:'',waterGlasses:'',caffeineCups:'',mood:'',notes:''});
    const u=(k,v)=>setF(p=>({...p,[k]:v}));
    const moods=['😊','😐','😴','😤','🤒','💪','😎','🥱'];
    const workoutTypes=[{v:'cardio',l:'🏃 '+T('كارديو','Cardio',language)},{v:'weights',l:'🏋️ '+T('أوزان','Weights',language)},{v:'walk',l:'🚶 '+T('مشي','Walk',language)},{v:'swim',l:'🏊 '+T('سباحة','Swim',language)},{v:'cycling',l:'🚴 '+T('دراجة','Cycling',language)},{v:'treadmill',l:'🏃 '+T('مشاية','Treadmill',language)},{v:'other',l:'⚡ '+T('أخرى','Other',language)}];
    const lbl=(t)=><label style={{fontSize:12,fontWeight:700,color:'var(--text2)',marginBottom:4,display:'block'}}>{t}</label>;
    const curBMI=f.weight&&profile.height?bmi(parseFloat(f.weight),parseFloat(profile.height)):null;
    return(<div className="overlay"><div className="modal" onClick={e=>e.stopPropagation()} style={{maxWidth:440,maxHeight:'90dvh',overflow:'auto'}}>
      <div style={{padding:'20px 24px',borderBottom:'1px solid var(--border)',display:'flex',justifyContent:'space-between',alignItems:'center'}}><h3 style={{fontSize:16,fontWeight:800}}>{isE?'✏️':'💚'} {T('سجل يومي','Daily Log',language)}</h3><span style={{fontSize:12,color:'var(--text2)',fontWeight:600}}>{new Date(f.date+'T12:00').toLocaleDateString(language==='ar'?'ar-SA':'en-US',{day:'numeric',month:'short',weekday:'short'})}</span></div>
      <div style={{padding:20,display:'flex',flexDirection:'column',gap:12}}>
        <div>{lbl(T('📅 التاريخ','📅 Date',language))}<input className="field" type="date" value={f.date} onChange={e=>u('date',e.target.value)}/></div>

        {/* Weight + BMI */}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
          <div>{lbl('⚖️ '+T('الوزن (كجم)','Weight (kg)',language))}<input className="field" type="number" step="0.1" value={f.weight||''} onChange={e=>u('weight',e.target.value)} placeholder="75.5"/></div>
          <div style={{display:'flex',alignItems:'flex-end',padding:'0 0 8px 0'}}>{curBMI&&<div style={{textAlign:'center',flex:1}}><div style={{fontSize:22,fontWeight:900,color:bmiColor(curBMI)}}>{curBMI}</div><div style={{fontSize:10,fontWeight:700,color:bmiColor(curBMI)}}>BMI — {bmiLabel(curBMI,language)}</div></div>}</div>
        </div>

        {/* Blood Pressure */}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
          <div>{lbl('🩸 '+T('ضغط الدم (عالي)','BP Systolic',language))}<input className="field" type="number" value={f.bpSystolic||''} onChange={e=>u('bpSystolic',e.target.value)} placeholder="120"/></div>
          <div>{lbl('🩸 '+T('ضغط الدم (منخفض)','BP Diastolic',language))}<input className="field" type="number" value={f.bpDiastolic||''} onChange={e=>u('bpDiastolic',e.target.value)} placeholder="80"/></div>
        </div>

        {/* Calories */}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
          <div>{lbl('🔥 '+T('سعرات مستهلكة','Calories In',language))}<input className="field" type="number" value={f.caloriesIn||''} onChange={e=>u('caloriesIn',e.target.value)} placeholder="2000"/></div>
          <div>{lbl('🔥 '+T('سعرات محروقة','Calories Out',language))}<input className="field" type="number" value={f.caloriesOut||''} onChange={e=>u('caloriesOut',e.target.value)} placeholder="500"/></div>
        </div>

        {/* Sleep + Steps */}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
          <div>{lbl('😴 '+T('النوم (ساعات)','Sleep (hours)',language))}<input className="field" type="number" step="0.5" value={f.sleepMinutes?f.sleepMinutes/60:''} onChange={e=>u('sleepMinutes',Math.round(parseFloat(e.target.value||0)*60))} placeholder="7.5"/></div>
          <div>{lbl('👣 '+T('الخطوات','Steps',language))}<input className="field" type="number" value={f.steps||''} onChange={e=>u('steps',e.target.value)} placeholder="8000"/></div>
        </div>

        {/* Water + Caffeine */}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
          <div>{lbl('💧 '+T('ماء (أكواب)','Water (glasses)',language))}<input className="field" type="number" value={f.waterGlasses||''} onChange={e=>u('waterGlasses',e.target.value)} placeholder="8"/></div>
          <div>{lbl('☕ '+T('كافيين (أكواب)','Caffeine (cups)',language))}<input className="field" type="number" value={f.caffeineCups||''} onChange={e=>u('caffeineCups',e.target.value)} placeholder="2"/></div>
        </div>

        {/* Fasting + Workout */}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
          <div>{lbl('🕐 '+T('الصيام (ساعات)','Fasting (hrs)',language))}<input className="field" type="number" step="0.5" value={f.fastingHours||''} onChange={e=>u('fastingHours',e.target.value)} placeholder="16"/></div>
          <div>{lbl('🏋️ '+T('التمرين (دقيقة)','Workout (min)',language))}<input className="field" type="number" value={f.workoutMinutes||''} onChange={e=>u('workoutMinutes',e.target.value)} placeholder="45"/></div>
        </div>

        {/* Workout Type */}
        {f.workoutMinutes>0&&<div>{lbl('🏷️ '+T('نوع التمرين','Workout Type',language))}<div style={{display:'flex',gap:4,flexWrap:'wrap'}}>{workoutTypes.map(wt=>(<div key={wt.v} onClick={()=>u('workoutType',wt.v)} style={{padding:'5px 10px',borderRadius:8,fontSize:11,fontWeight:700,cursor:'pointer',border:`2px solid ${f.workoutType===wt.v?'var(--teal)':'var(--border)'}`,background:f.workoutType===wt.v?'var(--teal-g)':'transparent',color:f.workoutType===wt.v?'var(--teal)':'var(--text2)'}}>{wt.l}</div>))}</div></div>}

        {/* Mood */}
        <div>{lbl('😊 '+T('المزاج','Mood',language))}<div style={{display:'flex',gap:5}}>{moods.map(em=>(<div key={em} onClick={()=>u('mood',em)} style={{width:36,height:36,borderRadius:10,display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,cursor:'pointer',border:`2px solid ${f.mood===em?'var(--teal)':'var(--border)'}`,background:f.mood===em?'var(--teal-g)':'transparent'}}>{em}</div>))}</div></div>

        <div>{lbl('📝 '+T('ملاحظات','Notes',language))}<textarea className="field" rows={2} value={f.notes||''} onChange={e=>u('notes',e.target.value)}/></div>
      </div>
      <div style={{padding:'16px 24px',borderTop:'1px solid var(--border)',display:'flex',gap:10,justifyContent:'flex-end'}}>
        {isE&&<button className="btn btn-ghost" style={{color:'var(--coral)',marginRight:'auto'}} onClick={()=>{onDeleteHealth(log);onClose();}}>🗑️</button>}
        <button className="btn btn-ghost" onClick={onClose}>{T('إلغاء','Cancel',language)}</button>
        <button className="btn btn-teal" onClick={()=>{
          const item={...f,id:f.id||uid(),
            weight:f.weight?parseFloat(f.weight):null,steps:f.steps?parseInt(f.steps):null,
            sleepMinutes:f.sleepMinutes?parseInt(f.sleepMinutes):null,fastingHours:f.fastingHours?parseFloat(f.fastingHours):null,
            workoutMinutes:f.workoutMinutes?parseInt(f.workoutMinutes):null,
            caloriesIn:f.caloriesIn?parseInt(f.caloriesIn):null,caloriesOut:f.caloriesOut?parseInt(f.caloriesOut):null,
            bpSystolic:f.bpSystolic?parseInt(f.bpSystolic):null,bpDiastolic:f.bpDiastolic?parseInt(f.bpDiastolic):null,
            waterGlasses:f.waterGlasses?parseInt(f.waterGlasses):null,caffeineCups:f.caffeineCups?parseInt(f.caffeineCups):null,
            bmi:f.weight&&profile.height?parseFloat(bmi(parseFloat(f.weight),parseFloat(profile.height))):null,
            createdAt:f.createdAt||new Date().toISOString()};
          onSaveHealth(item);onClose();
        }}>💚 {T('حفظ','Save',language)}</button>
      </div>
    </div></div>);
  };

  // ---- WEIGHT LINE CHART (SVG) ----
  const WeightChart=()=>{
    if(last30w.length<2)return <p style={{textAlign:'center',color:'var(--text2)',padding:20,fontSize:13}}>{T('سجل وزنك لمدة يومين على الأقل لعرض الرسم','Log weight for at least 2 days to see chart',language)}</p>;
    const w=300,h=120,px=30,py=10;
    const weights=last30w.map(d=>d.weight);const tgt=profile.targetWeight?parseFloat(profile.targetWeight):null;
    const allW=[...weights];if(tgt)allW.push(tgt);
    const minW=Math.min(...allW)-1,maxW=Math.max(...allW)+1;
    const scX=(i)=>px+((w-2*px)/(last30w.length-1))*i;
    const scY=(v)=>py+((maxW-v)/(maxW-minW))*(h-2*py);
    const pts=last30w.map((d,i)=>`${scX(i)},${scY(d.weight)}`).join(' ');
    return(<svg viewBox={`0 0 ${w} ${h+20}`} style={{width:'100%',height:'auto'}}>
      {tgt&&<><line x1={px} y1={scY(tgt)} x2={w-px} y2={scY(tgt)} stroke="var(--gold)" strokeWidth="1" strokeDasharray="4,3" opacity=".6"/>
      <text x={w-px+3} y={scY(tgt)+3} fill="var(--gold)" fontSize="8" fontWeight="700">{T('هدف','Goal',language)}</text></>}
      <polyline points={pts} fill="none" stroke="var(--teal)" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
      {last30w.map((d,i)=>(<circle key={i} cx={scX(i)} cy={scY(d.weight)} r="3.5" fill="var(--teal)" stroke="var(--bg2)" strokeWidth="1.5"/>))}
      {last30w.map((d,i)=>i===0||i===last30w.length-1?(<text key={'t'+i} x={scX(i)} y={scY(d.weight)-8} fill="var(--teal)" fontSize="9" fontWeight="800" textAnchor="middle">{d.weight}</text>):null)}
      {last30w.filter((_,i)=>i===0||i===last30w.length-1||i===Math.floor(last30w.length/2)).map((d,i)=>(<text key={'lb'+i} x={scX(last30w.indexOf(d))} y={h+14} fill="var(--text2)" fontSize="7" fontWeight="600" textAnchor="middle">{d.day}</text>))}
    </svg>);
  };

  // ---- BAR CHART (reusable) ----
  const BarChart7=({dataKey,color,unit})=>{
    const maxV=Math.max(...last7.map(d=>d[dataKey]||0),1);
    return(<div style={{display:'flex',alignItems:'flex-end',gap:6,height:90}}>
      {last7.map((d,i)=>{const v=d[dataKey]||0;return(<div key={i} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:3}}>
        {v>0&&<span style={{fontSize:8,fontWeight:700,color}}>{dataKey==='sleep'?fmtH(v):v.toLocaleString()}</span>}
        <div style={{width:'100%',height:`${Math.max((v/maxV)*65,2)}px`,background:v>0?`linear-gradient(180deg,${color},${color}88)`:'var(--bg3)',borderRadius:'5px 5px 0 0',transition:'height .3s'}}/>
        <span style={{fontSize:9,color:'var(--text2)',fontWeight:600}}>{d.day}</span>
      </div>);})}
    </div>);
  };

  return(<div style={{display:'flex',flexDirection:'column',gap:14}}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
      <h2 style={{fontSize:22,fontWeight:900}}>💚 {T('الصحة','Health',language)}</h2>
      <button className="btn btn-teal btn-sm" onClick={()=>setLogModal(todayLog||{_isNew:true,date:today})}>
        {todayLog?`✏️ ${T('تعديل اليوم','Edit Today',language)}`:`+ ${T('سجل اليوم','Log Today',language)}`}
      </button>
    </div>

    {/* ==== BODY PROFILE CARD ==== */}
    <div className="card" style={{padding:16,position:'relative'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
        <h3 style={{fontSize:14,fontWeight:800}}>👤 {T('ملف الجسم','Body Profile',language)}</h3>
        <button className="btn btn-ghost btn-xs" onClick={()=>setProfileModal(true)}>✏️ {T('تعديل','Edit',language)}</button>
      </div>
      {!profile.height?(<div style={{textAlign:'center',padding:16}}><p style={{color:'var(--text2)',fontSize:13,marginBottom:10}}>{T('أدخل بياناتك الأساسية أولاً','Set up your body profile first',language)}</p><button className="btn btn-teal btn-sm" onClick={()=>setProfileModal(true)}>👤 {T('إعداد الملف','Setup Profile',language)}</button></div>):(
      <div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(80px,1fr))',gap:8,marginBottom:8}}>
          <div style={{textAlign:'center'}}><div style={{fontSize:18,fontWeight:900,color:'var(--teal)'}}>{latestWeight||'—'}<span style={{fontSize:11}}> kg</span></div><div style={{fontSize:10,color:'var(--text2)',fontWeight:600}}>⚖️ {T('الوزن','Weight',language)}</div></div>
          <div style={{textAlign:'center'}}><div style={{fontSize:18,fontWeight:900,color:bmiColor(currentBMI)}}>{currentBMI||'—'}</div><div style={{fontSize:10,color:'var(--text2)',fontWeight:600}}>📊 BMI</div></div>
          <div style={{textAlign:'center'}}><div style={{fontSize:18,fontWeight:900,color:'var(--gold)'}}>{profile.targetWeight||'—'}<span style={{fontSize:11}}> kg</span></div><div style={{fontSize:10,color:'var(--text2)',fontWeight:600}}>🎯 {T('الهدف','Target',language)}</div></div>
          <div style={{textAlign:'center'}}><div style={{fontSize:18,fontWeight:900,color:'var(--text)'}}>{profile.height}<span style={{fontSize:11}}> cm</span></div><div style={{fontSize:10,color:'var(--text2)',fontWeight:600}}>📏 {T('الطول','Height',language)}</div></div>
        </div>
        {currentBMI&&<><div style={{fontSize:12,fontWeight:700,textAlign:'center',color:bmiColor(currentBMI)}}>{bmiLabel(currentBMI,language)}</div><BMIGauge value={currentBMI}/></>}
        {weightChange!==null&&<div style={{textAlign:'center',marginTop:10,fontSize:12,fontWeight:700,color:parseFloat(weightChange)>0?'var(--coral)':parseFloat(weightChange)<0?'var(--lime)':'var(--text2)'}}>
          {parseFloat(weightChange)>0?'📈':'📉'} {parseFloat(weightChange)>0?'+':''}{weightChange} kg {T('عن آخر قراءة','from last',language)}
        </div>}
        {(profile.waist||profile.bodyFat)&&<div style={{display:'flex',justifyContent:'center',gap:16,marginTop:10,fontSize:11,color:'var(--text2)'}}>
          {profile.waist&&<span>📐 {T('الخصر','Waist',language)}: <strong>{profile.waist} cm</strong></span>}
          {profile.bodyFat&&<span>📐 {T('الدهون','Fat',language)}: <strong>{profile.bodyFat}%</strong></span>}
        </div>}
      </div>)}
    </div>

    {/* ==== SUMMARY STATS ==== */}
    <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(90px,1fr))',gap:8}}>
      <div className="stat-card"><span className="sv" style={{color:'var(--electric)',fontSize:18}}>{avgSleepVal?fmtH(avgSleepVal):'—'}</span><span className="sl">😴 {T('نوم ٧ أيام','7d Sleep',language)}</span></div>
      <div className="stat-card"><span className="sv" style={{color:'var(--gold)',fontSize:18}}>{totalSteps7?totalSteps7.toLocaleString():'—'}</span><span className="sl">👣 {T('خطوات ٧ أيام','7d Steps',language)}</span></div>
      {todayLog?.waterGlasses>0&&<div className="stat-card"><span className="sv" style={{color:'#54A0FF',fontSize:18}}>{todayLog.waterGlasses} 💧</span><span className="sl">{T('ماء اليوم','Water Today',language)}</span></div>}
      {todayLog?.bpSystolic&&<div className="stat-card"><span className="sv" style={{color:'var(--coral)',fontSize:16}}>{todayLog.bpSystolic}/{todayLog.bpDiastolic}</span><span className="sl">🩸 {T('ضغط الدم','BP',language)}</span></div>}
    </div>

    {/* ==== CHARTS ==== */}
    <div className="card" style={{padding:16}}>
      <div style={{display:'flex',gap:4,marginBottom:12}}>
        {[{k:'weight',l:T('⚖️ الوزن','⚖️ Weight',language)},{k:'steps',l:T('👣 خطوات','👣 Steps',language)},{k:'sleep',l:T('😴 نوم','😴 Sleep',language)}].map(t=>(<div key={t.k} onClick={()=>setChartTab(t.k)} style={{padding:'5px 12px',borderRadius:8,fontSize:12,fontWeight:700,cursor:'pointer',background:chartTab===t.k?'var(--teal-g)':'transparent',color:chartTab===t.k?'var(--teal)':'var(--text2)',border:`1px solid ${chartTab===t.k?'var(--teal)':'transparent'}`}}>{t.l}</div>))}
      </div>
      {chartTab==='weight'&&<WeightChart/>}
      {chartTab==='steps'&&<BarChart7 dataKey="steps" color="var(--teal)" unit=""/>}
      {chartTab==='sleep'&&<BarChart7 dataKey="sleep" color="var(--electric)" unit=""/>}
    </div>

    {/* ==== HISTORY ==== */}
    <div className="card" style={{padding:16}}>
      <h3 style={{fontSize:14,fontWeight:800,marginBottom:12}}>📋 {T('السجل','History',language)}</h3>
      {!logs.length?<p style={{textAlign:'center',color:'var(--text2)',padding:20}}>💚 {T('سجل أول قراءة صحية!','Log your first health entry!',language)}</p>:
      logs.slice(0,20).map(l=>{const bmiV=l.weight&&profile.height?bmi(l.weight,parseFloat(profile.height)):null;return(
        <div key={l.id} onClick={()=>setLogModal(l)} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 0',borderBottom:'1px solid var(--border)',cursor:'pointer'}}>
          <div style={{fontSize:20,width:36,textAlign:'center'}}>{l.mood||'📋'}</div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontWeight:700,fontSize:13}}>{new Date(l.date+'T12:00').toLocaleDateString(language==='ar'?'ar-SA':'en-US',{day:'numeric',month:'short',weekday:'short'})}</div>
            <div style={{display:'flex',gap:5,flexWrap:'wrap',marginTop:3,fontSize:10,color:'var(--text2)'}}>
              {l.weight&&<span>⚖️{l.weight}</span>}
              {bmiV&&<span style={{color:bmiColor(bmiV)}}>📊{bmiV}</span>}
              {l.bpSystolic&&<span>🩸{l.bpSystolic}/{l.bpDiastolic}</span>}
              {l.sleepMinutes>0&&<span>😴{fmtH(l.sleepMinutes)}</span>}
              {l.steps>0&&<span>👣{l.steps.toLocaleString()}</span>}
              {l.waterGlasses>0&&<span>💧{l.waterGlasses}</span>}
              {l.caffeineCups>0&&<span>☕{l.caffeineCups}</span>}
              {l.caloriesIn>0&&<span>🔥{l.caloriesIn}</span>}
              {l.fastingHours>0&&<span>🕐{l.fastingHours}{T('س','h',language)}</span>}
              {l.workoutMinutes>0&&<span>🏋️{l.workoutMinutes}{T('د','m',language)}</span>}
            </div>
          </div>
          <span style={{fontSize:12,color:'var(--text2)'}}>✏️</span>
        </div>
      );})}
    </div>
    {logModal&&<DailyLogModal log={logModal} onClose={()=>setLogModal(null)}/>}
    {profileModal&&<ProfileModal/>}
  </div>);
}

// ========== LIVE WIDGET (Weather + Prayer) ==========
function PrayerModal({prayers,language,city,onClose}){
  if(!prayers)return null;
  const rows=[
    {k:'Fajr',   ar:'الفجر',  en:'Fajr',    icon:'🌙', grad:'135deg,#1a1a4e,#2d1b69'},
    {k:'Sunrise',ar:'الشروق', en:'Sunrise',  icon:'🌅', grad:'135deg,#7b4f12,#c87941'},
    {k:'Dhuhr',  ar:'الظهر',  en:'Dhuhr',   icon:'☀️', grad:'135deg,#5a3a00,#b8860b'},
    {k:'Asr',    ar:'العصر',  en:'Asr',     icon:'🌤️', grad:'135deg,#003d5c,#0a7fa3'},
    {k:'Maghrib',ar:'المغرب', en:'Maghrib', icon:'🌇', grad:'135deg,#4a0e2e,#a0304e'},
    {k:'Isha',   ar:'العشاء', en:'Isha',    icon:'🌃', grad:'135deg,#0d1b2a,#1e3a5f'},
  ];

  // ── Live tick every second ──
  const[tick,setTick]=useState(0);
  useEffect(()=>{const iv=setInterval(()=>setTick(t=>t+1),1000);return()=>clearInterval(iv);},[]);

  const to12=(t24)=>{if(!t24)return'';const[h,m]=t24.split(':').map(Number);const ampm=h>=12?(language==='ar'?'م':'PM'):(language==='ar'?'ص':'AM');const h12=h===0?12:h>12?h-12:h;return `${h12}:${String(m).padStart(2,'0')} ${ampm}`;};

  const getSecsLeft=(t24)=>{if(!t24)return -1;const now=new Date();const[h,m]=t24.split(':').map(Number);const target=new Date(now);target.setHours(h,m,0,0);return Math.floor((target-now)/1000);};

  const fmtCountdown=(secs)=>{if(secs<=0)return'';const h=Math.floor(secs/3600),m=Math.floor((secs%3600)/60),s=secs%60;if(h>0)return language==='ar'?`${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')} س`:`${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;};

  // ── Find next prayer (loops to Fajr after Isha) ──
  const now=new Date();
  let nextPrayer=null,nextSecs=0;
  for(const r of rows){
    const secs=getSecsLeft(prayers[r.k]);
    if(secs>0){nextPrayer={...r,time:prayers[r.k]};nextSecs=secs;break;}
  }
  // After all prayers passed → loop to Fajr tomorrow
  if(!nextPrayer&&prayers['Fajr']){
    const fajrRow=rows[0];
    const[h,m]=prayers['Fajr'].split(':').map(Number);
    const tomorrow=new Date(now);tomorrow.setDate(tomorrow.getDate()+1);tomorrow.setHours(h,m,0,0);
    nextSecs=Math.floor((tomorrow-now)/1000);
    nextPrayer={...fajrRow,time:prayers['Fajr']};
  }

  // ── Progress ring for countdown ──
  const maxSecs=6*3600; // max 6 hours display
  const pct=nextSecs?Math.max(0,Math.min(1,nextSecs/maxSecs)):0;
  const R=54, C=2*Math.PI*R;

  return(
  <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.8)',backdropFilter:'blur(10px)',zIndex:9999,display:'flex',alignItems:'center',justifyContent:'center',padding:16}} onClick={onClose}>
  <div className="modal" onClick={e=>e.stopPropagation()} style={{maxWidth:380,width:'100%',borderRadius:24,overflow:'hidden',padding:0,maxHeight:'90dvh',display:'flex',flexDirection:'column'}}>

    {/* ── Next Prayer Hero Card ── */}
    {nextPrayer&&<div style={{background:`linear-gradient(${nextPrayer.grad})`,padding:'16px 20px 14px',textAlign:'center',position:'relative',overflow:'hidden',flexShrink:0}}>
      <div style={{position:'absolute',inset:0,background:'radial-gradient(circle at 30% 50%,rgba(255,255,255,.06),transparent 60%)'}}/>
      <div style={{fontSize:10,fontWeight:700,letterSpacing:2,color:'rgba(255,255,255,.6)',textTransform:'uppercase',marginBottom:8}}>
        {language==='ar'?'الصلاة القادمة':'NEXT PRAYER'}
      </div>
      {/* Ring + Icon */}
      <div style={{position:'relative',width:110,height:110,margin:'0 auto 10px'}}>
        <svg width="110" height="110" style={{transform:'rotate(-90deg)',position:'absolute',inset:0}}>
          <circle cx="55" cy="55" r={R} fill="none" stroke="rgba(255,255,255,.12)" strokeWidth="5"/>
          <circle cx="55" cy="55" r={R} fill="none" stroke="rgba(255,255,255,.85)" strokeWidth="5"
            strokeLinecap="round" strokeDasharray={C} strokeDashoffset={C*(1-pct)}
            style={{transition:'stroke-dashoffset .5s'}}/>
        </svg>
        <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:1}}>
          <span style={{fontSize:26}}>{nextPrayer.icon}</span>
          <span style={{fontSize:14,fontWeight:800,color:'white'}}>{language==='ar'?nextPrayer.ar:nextPrayer.en}</span>
          <span style={{fontSize:12,color:'rgba(255,255,255,.8)',direction:'ltr',fontVariantNumeric:'tabular-nums'}}>{to12(nextPrayer.time)}</span>
        </div>
      </div>
      {/* Live countdown */}
      <div style={{fontSize:32,fontWeight:900,color:'white',fontVariantNumeric:'tabular-nums',direction:'ltr',letterSpacing:1,lineHeight:1}}>
        {fmtCountdown(nextSecs)}
      </div>
      <div style={{fontSize:11,color:'rgba(255,255,255,.6)',marginTop:4}}>
        {language==='ar'?'متبقي على الأذان':'remaining until adhan'}
      </div>
      {city&&<div style={{fontSize:11,color:'rgba(255,255,255,.5)',marginTop:8}}>📍 {city}</div>}
    </div>}

    {/* ── All Prayers List ── */}
    <div style={{padding:'12px 16px',display:'flex',flexDirection:'column',gap:2,overflowY:'auto',flex:1}}>
      {(()=>{let foundNext=false;return rows.map(r=>{
        const time=prayers[r.k];if(!time)return null;
        const secs=getSecsLeft(time);
        const isPassed=secs<=0;
        const isNext=!isPassed&&!foundNext;
        if(isNext)foundNext=true;
        return(
        <div key={r.k} style={{display:'flex',alignItems:'center',gap:10,padding:'9px 12px',borderRadius:12,
          background:isNext?'var(--teal-g)':'transparent',
          border:isNext?'1px solid var(--teal)':'1px solid transparent',
          opacity:isPassed?.45:1,transition:'opacity .2s'}}>
          <span style={{fontSize:18,width:28,textAlign:'center'}}>{r.icon}</span>
          <span style={{flex:1,fontWeight:isNext?800:600,fontSize:14,color:isNext?'var(--teal)':'var(--text)'}}>{language==='ar'?r.ar:r.en}</span>
          <div style={{textAlign:'end',direction:'ltr'}}>
            <div style={{fontWeight:800,fontSize:15,color:isNext?'var(--teal)':'var(--text)',fontVariantNumeric:'tabular-nums'}}>{to12(time)}</div>
            {isNext&&nextSecs>0&&<div style={{fontSize:10,fontWeight:700,color:'var(--teal)',fontVariantNumeric:'tabular-nums',direction:'ltr'}}>{fmtCountdown(nextSecs)}</div>}
          </div>
        </div>);
      });})()}
    </div>

    <div style={{padding:'10px 16px 14px',borderTop:'1px solid var(--border)',display:'flex',justifyContent:'center',flexShrink:0,direction:'ltr'}}>
      <button className="btn btn-ghost btn-sm" style={{minWidth:140,textAlign:'center',justifyContent:'center'}} onClick={onClose}>{T('إغلاق','Close',language)}</button>
    </div>
  </div></div>);
}

function LiveWidget({language}){
  const[temp,setTemp]=useState(null);
  const[city,setCity]=useState(null);
  const[prayers,setPrayers]=useState(null);
  const[showPrayer,setShowPrayer]=useState(false);
  const[userCoords,setUserCoords]=useState(null);

  useEffect(()=>{
    const fetchWeather=async(lat,lon)=>{try{
      const r=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weather_code`);
      const d=await r.json();
      if(d&&d.current){setTemp(Math.round(d.current.temperature_2m));}
    }catch(e){console.warn('Weather API error:',e);}};

    const fetchPrayers=async(lat,lon)=>{try{
      const today=new Date();const dd=String(today.getDate()).padStart(2,'0');const mm=String(today.getMonth()+1).padStart(2,'0');const yyyy=today.getFullYear();
      const r=await fetch(`https://api.aladhan.com/v1/timings/${dd}-${mm}-${yyyy}?latitude=${lat}&longitude=${lon}&method=4`);
      const d=await r.json();
      if(d&&d.data&&d.data.timings){setPrayers(d.data.timings);localStorage.setItem('gt-prayers',JSON.stringify(d.data.timings));}
    }catch(e){console.warn('Prayer API error:',e);}};

    const fetchCityName=async(lat,lon)=>{try{
      const r=await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&accept-language=${language==='ar'?'ar':'en'}`);
      const d=await r.json();
      if(d&&d.address){setCity(d.address.city||d.address.town||d.address.state||T('موقعك','Your Location',language));}
    }catch(e){console.warn('Geocoding error:',e);}};

    const init=(lat,lon)=>{
      setUserCoords({lat,lon});
      fetchWeather(lat,lon);
      fetchPrayers(lat,lon);
      fetchCityName(lat,lon);
    };

    if('geolocation' in navigator){
      navigator.geolocation.getCurrentPosition(
        pos=>init(pos.coords.latitude,pos.coords.longitude),
        ()=>{setCity(T('الرياض','Riyadh',language));init(24.7136,46.6753);}
      );
    }else{setCity(T('الرياض','Riyadh',language));init(24.7136,46.6753);}
  },[language]);

  if(temp===null&&!prayers)return null;

  const weatherIcon=(t)=>{if(t===null)return'';if(t>=40)return'🔥';if(t>=30)return'☀️';if(t>=20)return'🌤️';if(t>=10)return'⛅';if(t>=0)return'🌥️';return'❄️';};

  return(<>
    <div style={{display:'flex',gap:6,alignItems:'center',fontSize:10,color:'var(--text2)',fontWeight:600}}>
      {temp!==null&&<span title={city||''} style={{display:'flex',alignItems:'center',gap:3,background:'var(--teal-g)',color:'var(--teal)',padding:'2px 8px',borderRadius:8,cursor:'default'}}>{weatherIcon(temp)} {temp}°C</span>}
      {prayers&&<span onClick={()=>setShowPrayer(true)} title={T('مواقيت الصلاة','Prayer Times',language)} style={{display:'flex',alignItems:'center',gap:3,background:'var(--gold-g)',color:'var(--gold)',padding:'2px 8px',borderRadius:8,cursor:'pointer'}}>🕌</span>}
    </div>
    {showPrayer&&ReactDOM.createPortal(<PrayerModal prayers={prayers} language={language} city={city} onClose={()=>setShowPrayer(false)}/>,document.body)}
  </>);
}

const NOTIF_DEFAULTS={enabled:false,meetingReminder:15,prayerReminder:10,taskReminder:true,healthReminder:true,backupReminder:true};
function getNotifSettings(){try{return{...NOTIF_DEFAULTS,...JSON.parse(localStorage.getItem('gt-notif')||'{}')};}catch(e){return NOTIF_DEFAULTS;}}
function saveNotifSettings(s){localStorage.setItem('gt-notif',JSON.stringify(s));}
function getSentNotifs(){try{return JSON.parse(localStorage.getItem('gt-notif-sent')||'{}');}catch(e){return{};}}
function markNotifSent(key){const s=getSentNotifs();s[key]=Date.now();const cutoff=Date.now()-86400000;Object.keys(s).forEach(k=>{if(s[k]<cutoff)delete s[k];});localStorage.setItem('gt-notif-sent',JSON.stringify(s));}
function wasNotifSent(key){const s=getSentNotifs();return!!s[key];}

// Sound alert using Web Audio API
function playAlertSound(){
  try{const ctx=new(window.AudioContext||window.webkitAudioContext)();
  const osc=ctx.createOscillator();const gain=ctx.createGain();
  osc.connect(gain);gain.connect(ctx.destination);
  osc.frequency.setValueAtTime(880,ctx.currentTime);
  osc.frequency.setValueAtTime(1100,ctx.currentTime+0.1);
  osc.frequency.setValueAtTime(880,ctx.currentTime+0.2);
  gain.gain.setValueAtTime(0.3,ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.01,ctx.currentTime+0.5);
  osc.start(ctx.currentTime);osc.stop(ctx.currentTime+0.5);
  }catch(e){}
}

// Global in-app alert queue
let _inAppAlertFn=null;
function setInAppAlertFn(fn){_inAppAlertFn=fn;}
function showInAppAlert(title,body){if(_inAppAlertFn)_inAppAlertFn({title,body,id:Date.now()});}

function sendNotif(title,body,icon,tag){
  // Always show in-app alert
  showInAppAlert(title,body);
  playAlertSound();
  // Also try browser notification
  if('Notification' in window && Notification.permission==='granted'){
    try{new Notification(title,{body,icon:icon||'🔔',tag:tag||'mutqin-'+Date.now(),silent:false});}catch(e){console.warn('Notif error:',e);}
  }
}

function useNotifications(data,lang){
  const checkRef=useRef(null);

  useEffect(()=>{
    const check=()=>{
      const s=getNotifSettings();
      if(!s.enabled)return;
      const now=new Date();
      const nowMs=now.getTime();
      const ts=localDS();

      // 1. Meeting reminders
      (data.meetings||[]).forEach(m=>{
        if(!m.meetingDate||m.meetingStatus==='cancelled')return;
        const mTime=new Date(m.meetingDate).getTime();
        const diff=(mTime-nowMs)/60000;
        const key=`meet-${m.id}-${ts}`;
        if(diff>0&&diff<=s.meetingReminder&&!wasNotifSent(key)){
          sendNotif(
            '👥 '+m.title,
            T(`بعد ${Math.round(diff)} دقيقة`,`In ${Math.round(diff)} minutes`,lang)+(m.location?' — 📍 '+m.location:''),
            '👥','meet-'+m.id
          );
          markNotifSent(key);
        }
      });

      // 2. Prayer reminders
      try{
        const prayerData=JSON.parse(localStorage.getItem('gt-prayers')||'null');
        if(prayerData){
          const prayers=['Fajr','Dhuhr','Asr','Maghrib','Isha'];
          const pNames={Fajr:T('الفجر','Fajr',lang),Dhuhr:T('الظهر','Dhuhr',lang),Asr:T('العصر','Asr',lang),Maghrib:T('المغرب','Maghrib',lang),Isha:T('العشاء','Isha',lang)};
          prayers.forEach(p=>{
            const t=prayerData[p];if(!t)return;
            const[h,m]=t.split(':').map(Number);
            const pTime=new Date(now);pTime.setHours(h,m,0,0);
            const diff=(pTime.getTime()-nowMs)/60000;
            const key=`prayer-${p}-${ts}`;
            if(diff>0&&diff<=s.prayerReminder&&!wasNotifSent(key)){
              sendNotif('🕌 '+(pNames[p]||p),T(`حان وقت صلاة ${pNames[p]||p} بعد ${Math.round(diff)} دقيقة`,`${pNames[p]||p} prayer in ${Math.round(diff)} minutes`,lang),'🕌','prayer-'+p);
              markNotifSent(key);
            }
          });
        }
      }catch(e){}

      // 3. Task reminder (8 AM)
      if(s.taskReminder&&now.getHours()===8&&now.getMinutes()<2){
        const key=`tasks-${ts}`;
        if(!wasNotifSent(key)){
          const todayTasks=[...(data.tasks||[]),...(data.quickTasks||[])].filter(t=>t.dueDate?.startsWith(ts)&&t.status!=='complete');
          if(todayTasks.length>0){
            sendNotif('✅ '+T('مهام اليوم','Today\'s Tasks',lang),T(`لديك ${todayTasks.length} مهمة اليوم`,`You have ${todayTasks.length} tasks today`,lang),'✅','tasks-today');
            markNotifSent(key);
          }
        }
      }

      // 4. Health reminder (9 PM)
      if(s.healthReminder&&now.getHours()===21&&now.getMinutes()<2){
        const key=`health-${ts}`;
        if(!wasNotifSent(key)){
          const hasLog=(data.healthLogs||[]).some(l=>l.date===ts);
          if(!hasLog){
            sendNotif('💚 '+T('السجل الصحي','Health Log',lang),T('لم تسجل بياناتك الصحية اليوم','You haven\'t logged health data today',lang),'💚','health-today');
            markNotifSent(key);
          }
        }
      }

      // 5. Backup reminder (weekly)
      if(s.backupReminder){
        const lastExport=localStorage.getItem('gt-last-export');
        const daysSince=lastExport?Math.floor((nowMs-new Date(lastExport).getTime())/86400000):999;
        const key=`backup-week-${Math.floor(nowMs/604800000)}`;
        if(daysSince>=7&&!wasNotifSent(key)){
          sendNotif('💾 '+T('نسخة احتياطية','Backup',lang),T('مضى أسبوع على آخر نسخة احتياطية','It\'s been a week since your last backup',lang),'💾','backup');
          markNotifSent(key);
        }
      }
    };

    check(); // run immediately on mount
    checkRef.current=setInterval(check,60000); // then every minute
    return()=>clearInterval(checkRef.current);
  },[data,lang]);
}

// GOOGLE DRIVE INTEGRATION
// ============================================================
const GD_SCOPE = 'https://www.googleapis.com/auth/drive.file';
const GD_FOLDER_NAME = 'Mutqin Backups';

function gdGetClientId(){ return localStorage.getItem('gt-gd-client-id')||''; }
function gdSaveClientId(id){ localStorage.setItem('gt-gd-client-id', id); }
function gdGetToken(){ try{ const t=JSON.parse(localStorage.getItem('gt-gd-token')||'null'); if(!t)return null; if(Date.now()>t.expires)return null; return t.access_token; }catch(e){return null;} }
function gdSaveToken(t){ localStorage.setItem('gt-gd-token', JSON.stringify({access_token:t.access_token,expires:Date.now()+(t.expires_in-60)*1000})); }
function gdClearToken(){ localStorage.removeItem('gt-gd-token'); }
function gdGetLastUpload(){ return localStorage.getItem('gt-gd-last-upload')||null; }
function gdSetLastUpload(){ localStorage.setItem('gt-gd-last-upload', new Date().toISOString()); }

async function gdAuth(clientId){
  return new Promise((resolve,reject)=>{
    if(!window.google||!window.google.accounts){ reject(new Error('Google SDK not loaded')); return; }
    const client = window.google.accounts.oauth2.initTokenClient({
      client_id: clientId,
      scope: GD_SCOPE,
      callback: (resp) => {
        if(resp.error){ reject(new Error(resp.error)); return; }
        gdSaveToken(resp);
        resolve(resp.access_token);
      }
    });
    client.requestAccessToken();
  });
}

async function gdGetOrCreateFolder(token){
  // Search for existing folder
  const q = encodeURIComponent(`name='${GD_FOLDER_NAME}' and mimeType='application/vnd.google-apps.folder' and trashed=false`);
  const res = await fetch(`https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id,name)`,{
    headers:{ Authorization:`Bearer ${token}` }
  });
  const data = await res.json();
  if(data.files&&data.files.length>0) return data.files[0].id;
  // Create folder
  const cr = await fetch('https://www.googleapis.com/drive/v3/files',{
    method:'POST',
    headers:{ Authorization:`Bearer ${token}`, 'Content-Type':'application/json' },
    body: JSON.stringify({ name:GD_FOLDER_NAME, mimeType:'application/vnd.google-apps.folder' })
  });
  const folder = await cr.json();
  return folder.id;
}

async function gdUploadBackup(token, jsonStr, filename){
  const folderId = await gdGetOrCreateFolder(token);
  const metadata = { name:filename, mimeType:'application/json', parents:[folderId] };
  const form = new FormData();
  form.append('metadata', new Blob([JSON.stringify(metadata)],{type:'application/json'}));
  form.append('file', new Blob([jsonStr],{type:'application/json'}));
  const res = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,name,createdTime,size',{
    method:'POST', headers:{ Authorization:`Bearer ${token}` }, body:form
  });
  return await res.json();
}

async function gdListBackups(token){
  const folderId = await gdGetOrCreateFolder(token);
  const q = encodeURIComponent(`'${folderId}' in parents and trashed=false and mimeType='application/json'`);
  const res = await fetch(`https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id,name,createdTime,size)&orderBy=createdTime desc&pageSize=10`,{
    headers:{ Authorization:`Bearer ${token}` }
  });
  const data = await res.json();
  return data.files||[];
}

async function gdDownloadFile(token, fileId){
  const res = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`,{
    headers:{ Authorization:`Bearer ${token}` }
  });
  return await res.text();
}

async function gdDeleteFile(token, fileId){
  await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}`,{
    method:'DELETE', headers:{ Authorization:`Bearer ${token}` }
  });
}

function gdFmtSize(bytes){
  if(!bytes) return '';
  if(bytes<1024) return bytes+'B';
  if(bytes<1024*1024) return Math.round(bytes/1024)+'KB';
  return (bytes/1024/1024).toFixed(1)+'MB';
}

  const setLang=useCallback((l)=>{setLangState(l);localStorage.setItem('gt-lang',l);},[]);
  const[view,setView]=useState('today');
  const[data,setData]=useState({goals:[],milestones:[],tasks:[],quickTasks:[],taskLists:[],meetings:[]});
  const[toasts,setToasts]=useState([]);const[modal,setModal]=useState(null);const[confirm,setConfirm]=useState(null);
  const[dayView,setDayView]=useState(null);const[listModal,setListModal]=useState(null);const[uploadModal,setUploadModal]=useState(false);

  const[expFromCal,setExpFromCal]=useState(null);
  useEffect(()=>{const h=e=>{e.preventDefault();setInstallPrompt(e);};window.addEventListener('beforeinstallprompt',h);return()=>window.removeEventListener('beforeinstallprompt',h);},[]);
  const handleInstall=useCallback(async()=>{if(!installPrompt)return;installPrompt.prompt();const{outcome}=await installPrompt.userChoice;if(outcome==='accepted')toast(T('تم التثبيت! 📱','Installed! 📱',lang));setInstallPrompt(null);},[installPrompt,toast,lang]);

  const load=useCallback(async()=>{
    const d={};for(const s of ST)d[s]=await dAll(s);
    // Auto-clean orphaned tasks (milestoneId → milestone that no longer exists)
    const msIds=new Set((d.milestones||[]).map(m=>m.id));
    const goalIds=new Set((d.goals||[]).map(g=>g.id));
    let orphansFixed=0;
    for(const tk of(d.tasks||[])){
      if(tk.milestoneId&&!msIds.has(tk.milestoneId)){
        await dPut('tasks',{...tk,milestoneId:''});
        orphansFixed++;
      }
    }
    // Also clean orphaned milestones (goalId → goal that no longer exists)
    for(const ms of(d.milestones||[])){
      if(ms.goalId&&!goalIds.has(ms.goalId)){
        await dPut('milestones',{...ms,goalId:''});
        orphansFixed++;
      }
    }
    if(orphansFixed>0){
      // Re-read after cleanup
      for(const s of['tasks','milestones'])d[s]=await dAll(s);
    }
    setData(d);
    // Auto-backup: rolling 7-day daily snapshots
    try{
      const total=Object.values(d).reduce((s,a)=>s+a.length,0);
      if(total>0){
        const backup=JSON.stringify(d);
        const today=new Date().toISOString().slice(0,10);
        // Always keep 1 latest + 1 per day for last 7 days
        localStorage.setItem('gt-auto-backup',backup);
        localStorage.setItem('gt-auto-backup-date',new Date().toISOString());
        localStorage.setItem('gt-auto-backup-count',String(total));
        // Daily snapshot key
        const dayKey=`gt-snap-${today}`;
        localStorage.setItem(dayKey,backup);
        localStorage.setItem(dayKey+'-count',String(total));
        // Prune snapshots older than 7 days
        const cutoff=new Date();cutoff.setDate(cutoff.getDate()-7);
        Object.keys(localStorage).filter(k=>k.startsWith('gt-snap-')).forEach(k=>{
          const dateStr=k.replace('gt-snap-','').replace('-count','');
          if(dateStr.match(/^\d{4}-\d{2}-\d{2}$/)&&new Date(dateStr)<cutoff){
            try{localStorage.removeItem(k);}catch(e){}
          }
        });
      }
    }catch(e){/* localStorage full — ignore */}
  },[]);
  const[restorePrompt,setRestorePrompt]=useState(null);
  useEffect(()=>{(async()=>{
    await initCats();await load();
    // Check if data is empty but backup exists
    const d={};for(const s of ST)d[s]=await dAll(s);
    const total=Object.values(d).reduce((s,a)=>s+a.length,0);
    if(total<=DEF_CATS.length){ // only default categories exist
      const backup=localStorage.getItem('gt-auto-backup');
      const backupDate=localStorage.getItem('gt-auto-backup-date');
      const backupCount=localStorage.getItem('gt-auto-backup-count');
      if(backup&&backupCount&&parseInt(backupCount)>DEF_CATS.length){
        setRestorePrompt({date:backupDate,count:backupCount});
      }
    }
  })();},[load]);
  const handleRestore=useCallback(async()=>{
    try{
      const backup=JSON.parse(localStorage.getItem('gt-auto-backup'));

      await initCats();await load();
      toast(T('🎉 تم استعادة البيانات بنجاح!','🎉 Data restored successfully!',lang),'success');
      setRestorePrompt(null);

  },[load,toast,lang]);
  useEffect(()=>{document.documentElement.lang=lang;document.documentElement.dir=lang==='ar'?'rtl':'ltr';},[lang]);
  useEffect(()=>{document.documentElement.className=theme==='light'?'light':'';localStorage.setItem('gt-theme',theme);},[theme]);
  useNotifications(data,lang);

  // Auto-defer overdue tasks (runs once after initial load)
  const deferRanRef=useRef(false);
  useEffect(()=>{
    if(deferRanRef.current||!data.tasks?.length)return;
    deferRanRef.current=true;
    const autoDefer=async()=>{
      const today=localDS();
      let deferred=0;
      for(const tk of data.tasks){
        if(!tk.autoDefer||tk.autoDefer==='none'||tk.status==='complete'||!tk.dueDate)continue;
        if(tk.dueDate>=today)continue;
        const dd=new Date(tk.dueDate+'T12:00');let nd=new Date(dd);
        if(tk.autoDefer==='daily')nd.setDate(nd.getDate()+1);
        else if(tk.autoDefer==='weekly')nd.setDate(nd.getDate()+7);
        else nd.setMonth(nd.getMonth()+1);
        while(nd.toISOString().slice(0,10)<today){
          if(tk.autoDefer==='daily')nd.setDate(nd.getDate()+1);
          else if(tk.autoDefer==='weekly')nd.setDate(nd.getDate()+7);
          else nd.setMonth(nd.getMonth()+1);
        }
        const updated={...tk,dueDate:nd.toISOString().slice(0,10),updatedAt:new Date().toISOString(),originalDueDate:tk.originalDueDate||tk.dueDate,deferCount:(tk.deferCount||0)+1};
        delete updated._s;delete updated._ns;delete updated._type;
        await dPut('tasks',updated);deferred++;
      }
      if(deferred>0){await load();toast(T(`⏩ تم ترحيل ${deferred} مهمة تلقائياً`,`⏩ ${deferred} task(s) auto-deferred`,lang),'info');}
    };
    autoDefer();
  },[data.tasks]);
  const toast=useCallback((msg,type='success')=>{const id=Date.now();setToasts(p=>[...p,{id,message:msg,type}]);setTimeout(()=>setToasts(p=>p.filter(t=>t.id!==id)),3000);},[]);
  const tsMap={goal:'goals',milestone:'milestones',task:'tasks',quickTask:'quickTasks',meeting:'meetings'};

  const handleSave=useCallback(async(type,item)=>{if(type==='milestone'&&modal?.goalId)item.goalId=modal.goalId;try{await dPut(tsMap[type],item);await load();toast(T('تم الحفظ ✅','Saved ✅',lang));setModal(null);}catch(e){toast(T('خطأ','Error',lang),'error');}},[modal,lang,load,toast]);

  const handleDelete=useCallback((store,id,title)=>{setConfirm({message:T(`حذف "${title}"؟`,`Delete "${title}"?`,lang),onOk:async()=>{await dDel(store,id);if(store==='goals'){for(const m of(data.milestones||[]).filter(m=>m.goalId===id)){for(const tk of(data.tasks||[]).filter(tk=>tk.milestoneId===m.id))await dDel('tasks',tk.id);await dDel('milestones',m.id);}}if(store==='milestones'){for(const tk of(data.tasks||[]).filter(tk=>tk.milestoneId===id))await dDel('tasks',tk.id);}await load();toast(T('تم الحذف 🗑️','Deleted 🗑️',lang));setConfirm(null);}});},[lang,data,load,toast]);
  const handleStatus=useCallback(async(store,item,ns)=>{
    const now=new Date().toISOString();
    const u={...item,status:ns,updatedAt:now};

    if(ns==='inProgress'&&!item.startedAt)u.startedAt=now;

    if(ns==='complete'){u.completedAt=now;if(!u.startedAt)u.startedAt=now;}

    if(ns!=='complete')delete u.completedAt;
    delete u._s;delete u._ns;delete u._type;

      toast(cheer(lang)+' ⏱️ '+dTxt,'success');

  const handleSaveList=useCallback(async l=>{await dPut('taskLists',l);await load();},[load]);
  const handleDeleteList=useCallback(l=>{setConfirm({message:T(`حذف "${l.name}"؟`,`Delete "${l.name}"?`,lang),onOk:async()=>{await dDel('taskLists',l.id);await load();toast(T('تم الحذف','Deleted',lang));setConfirm(null);}});},[lang,load,toast]);
  const handleSaveListModal=useCallback(async l=>{await dPut('taskLists',l);await load();toast(T('تم الحفظ','Saved',lang));setListModal(null);},[load,toast,lang]);

  // Get all available local snapshots for Vault view
  const getLocalSnapshots=useCallback(()=>{

      const dateStr=k.replace('gt-snap-','');
      const count=localStorage.getItem(k+'-count')||'?';
      try{const d=JSON.parse(localStorage.getItem(k)||'{}');const total=Object.values(d).reduce((s,a)=>s+(Array.isArray(a)?a.length:0),0);snaps.push({key:k,date:dateStr,count:total||count});}
      catch(e){snaps.push({key:k,date:dateStr,count:count});}
    });
    return snaps.sort((a,b)=>b.date.localeCompare(a.date));
  },[]);

  const handleRestoreSnapshot=useCallback(async(key)=>{
    try{
      const backup=JSON.parse(localStorage.getItem(key));

      for(const s of ST){await dClr(s);if(backup[s])for(const it of backup[s])await dPut(s,it);}

  },[load,toast,lang]);

  const handleDownloadSnapshot=useCallback((key,date)=>{

      const data=localStorage.getItem(key);
      if(!data)return;
      const b=new Blob([data],{type:'application/json'});
      const a=document.createElement('a');a.href=URL.createObjectURL(b);

    }catch(e){}
  },[]);

  const[vaultOpen,setVaultOpen]=useState(false);

  const handleCalExport=useCallback(()=>{const{content,count}=generateICS(data,lang);if(!count){toast(T('لا توجد مهام بتاريخ للتصدير','No dated tasks to export',lang),'warning');return;}const b=new Blob([content],{type:'text/calendar;charset=utf-8'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=`goal-tracker-${localDS()}.ics`;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),100);toast(T(`تم تصدير ${count} حدث للتقويم 📅`,`Exported ${count} events to calendar 📅`,lang));},[data,lang,toast]);
  const handleImport=useCallback(()=>{const inp=document.createElement('input');inp.type='file';inp.accept='.json';inp.onchange=async e=>{try{const txt=await e.target.files[0].text(),imp=JSON.parse(txt);const doIt=async()=>{
    for(const s of ST){await dClr(s);if(imp[s])for(const it of imp[s])await dPut(s,it);}
    // Restore localStorage settings if present

      if(s.rates)localStorage.setItem('gt-rates',s.rates);
      if(s.healthProfile)localStorage.setItem('gt-health-profile',s.healthProfile);
      if(s.recurringTemplates)localStorage.setItem('mutqin-recurring',s.recurringTemplates);
      if(s.notifSettings)localStorage.setItem('gt-notif',s.notifSettings);
      if(s.theme)localStorage.setItem('gt-theme',s.theme);
      if(s.language){localStorage.setItem('gt-lang',s.language);setLangState(s.language);}
      if(s.lastExport)localStorage.setItem('gt-last-export',s.lastExport);
    }

    toast(T('تم استيراد كل البيانات ✅','All data imported ✅',lang));
  };if(data.goals.length||data.expenses?.length||data.notes?.length)setConfirm({message:T('سيتم استبدال كل البيانات. متابعة؟','Replace ALL data? This cannot be undone.',lang),onOk:async()=>{await doIt();setConfirm(null);}});else await doIt();}catch(e){toast(T('خطأ في ملف الاستيراد','Invalid backup file',lang),'error');}};inp.click();},[data,lang,load,toast]);

  // Expense handlers
  const handleSaveExpense=useCallback(async(e,silent=false)=>{await dPut('expenses',e);await load();if(!silent)toast(T('تم حفظ المصروف 💰','Expense saved 💰',lang));
