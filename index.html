    if(e.budgetId&&!silent){const allE=await dAll('expenses');const b=(await dAll('budgets')).find(b=>b.id===e.budgetId);if(b){const r=getStoredRates().rates;const spent=allE.filter(x=>x.budgetId===b.id).reduce((s,x)=>s+convertWithSavedRate(x,b.currency,r),0);const pct=b.totalAmount?spent/b.totalAmount*100:0;if(pct>=100)toast(T(`🔴 تجاوزت ميزانية "${b.title}"!`,`🔴 Over budget "${b.title}"!`,lang),'error');else if(pct>=80)toast(T(`⚠️ وصلت ${Math.round(pct)}% من "${b.title}"`,`⚠️ ${Math.round(pct)}% of "${b.title}"`,lang),'warning');}}
  },[load,toast,lang]);
  const handleDeleteExpense=useCallback((e)=>{setConfirm({message:T(`حذف "${e.title}"؟`,`Delete "${e.title}"?`,lang),onOk:async()=>{await dDel('expenses',e.id);await load();toast(T('تم الحذف','Deleted',lang));setConfirm(null);}});},[lang,load,toast]);
  const handleSaveCategory=useCallback(async(c)=>{await dPut('categories',c);await load();toast(T('تم حفظ التصنيف','Category saved',lang));},[load,toast,lang]);
  const handleDeleteCategory=useCallback((c)=>{setConfirm({message:T(`حذف تصنيف "${c.name}"؟`,`Delete category "${c.nameEn}"?`,lang),onOk:async()=>{await dDel('categories',c.id);await load();toast(T('تم الحذف','Deleted',lang));setConfirm(null);}});},[lang,load,toast]);
  const handleSaveBudget=useCallback(async(b,silent=false)=>{await dPut('budgets',b);await load();if(!silent)toast(T('تم حفظ الميزانية','Budget saved',lang));},[load,toast,lang]);
  const handleDeleteBudget=useCallback((b)=>{const bExps=(data.expenses||[]).filter(e=>e.budgetId===b.id);if(bExps.length>0){toast(T(`لا يمكن حذف الميزانية — فيها ${bExps.length} مصروف ⚠️`,`Cannot delete budget — has ${bExps.length} expenses ⚠️`,lang));return;}setConfirm({message:T(`حذف ميزانية "${b.title}"؟`,`Delete budget "${b.title}"?`,lang),onOk:async()=>{await dDel('budgets',b.id);await load();toast(T('تم الحذف','Deleted',lang));setConfirm(null);}});},[lang,data,load,toast]);

  // Note handlers
  const handleSaveNote=useCallback(async(n)=>{await dPut('notes',n);await load();toast(T('تم حفظ الملاحظة 📓','Note saved 📓',lang));},[load,toast,lang]);
  const handleDeleteNote=useCallback((n)=>{setConfirm({message:T(`حذف "${n.title||'ملاحظة'}"؟`,`Delete "${n.title||'note'}"?`,lang),onOk:async()=>{await dDel('notes',n.id);await load();toast(T('تم الحذف','Deleted',lang));setConfirm(null);}});},[lang,load,toast]);

  // Health handlers
  const handleSaveHealth=useCallback(async(h)=>{await dPut('healthLogs',h);await load();toast(T('تم حفظ السجل الصحي 💚','Health log saved 💚',lang));},[load,toast,lang]);
  const handleDeleteHealth=useCallback((h)=>{setConfirm({message:T('حذف هذا السجل الصحي؟','Delete this health log?',lang),onOk:async()=>{await dDel('healthLogs',h.id);await load();toast(T('تم الحذف','Deleted',lang));setConfirm(null);}});},[lang,load,toast]);

  const navs=[{id:'dashboard',icon:'🎯',label:T('الأهداف','Goals',lang)},{id:'today',icon:'🔥',label:T('اليوم','Today',lang)},{id:'meetings',icon:'👥',label:T('اجتماعات','Meetings',lang)},{id:'expenses',icon:'💰',label:T('المصاريف','Expenses',lang)},{id:'health',icon:'💚',label:T('الصحة','Health',lang)},{id:'notes',icon:'📓',label:T('مفكرتي','Notes',lang)},{id:'timeline',icon:'📊',label:T('الجدول','Timeline',lang)}];
  return(
    <div style={{minHeight:'100dvh',display:'flex',flexDirection:'column',position:'relative',zIndex:1}}>
      <header style={{background:'var(--bg2)',borderBottom:'1px solid var(--border)',padding:'10px 14px',position:'sticky',top:0,zIndex:40,backdropFilter:'blur(12px)'}}>

            <button className="btn btn-ghost btn-icon-sm" title={T('الإشعارات','Notifications',lang)} onClick={()=>setNotifModal(true)} style={{position:'relative'}}>🔔{getNotifSettings().enabled&&<div style={{position:'absolute',top:4,right:4,width:7,height:7,borderRadius:'50%',background:'var(--teal)',border:'2px solid var(--bg2)'}}/>}</button>
            <button className="btn btn-ghost btn-icon-sm hidden sm:flex" title={theme==='dark'?T('الوضع الفاتح','Light Mode',lang):T('الوضع الداكن','Dark Mode',lang)} onClick={()=>setTheme(t=>t==='dark'?'light':'dark')}>{theme==='dark'?'☀️':'🌙'}</button>
            <button className="btn btn-ghost btn-icon-sm hidden sm:flex" title={previewMode==='desktop'?T('معاينة الجوال','Mobile Preview',lang):T('معاينة سطح المكتب','Desktop View',lang)} onClick={()=>setPreviewMode(p=>p==='desktop'?'mobile':'desktop')} style={{fontSize:16}}>{previewMode==='desktop'?'📱':'💻'}</button>
            <button className="btn btn-ghost btn-icon-sm hidden sm:flex" title={T('استيراد من Excel','Import Excel',lang)} onClick={()=>setUploadModal(true)}>📂</button>
            <button className="btn btn-ghost btn-icon-sm hidden sm:flex" title={T('تصدير للتقويم','Export to Calendar',lang)} onClick={handleCalExport} style={{fontSize:16}}>📅</button>
            <button className="btn btn-ghost btn-icon-sm hidden sm:flex" title={T('تصدير JSON','Export JSON',lang)} onClick={handleExport}>📤</button>
            <button className="btn btn-ghost btn-icon-sm hidden sm:flex" title={T('استيراد JSON','Import JSON',lang)} onClick={handleImport}>📥</button>
            <button className="btn btn-ghost btn-sm hidden sm:flex" onClick={()=>setLang(lang==='ar'?'en':'ar')} style={{fontWeight:800,fontSize:12,padding:'4px 8px'}}>{lang==='ar'?'EN':'ع'}</button>
            {/* Mobile More Menu Button */}
            <button className="btn btn-ghost btn-icon-sm sm:hidden" onClick={()=>setMoreMenu(!moreMenu)} style={{fontSize:18,position:'relative'}}>⋮</button>
          </div>
          {/* Mobile Dropdown Menu */}
          {moreMenu&&<div onClick={()=>setMoreMenu(false)} style={{position:'fixed',inset:0,zIndex:99}}/>}
          {moreMenu&&<div style={{position:'absolute',top:'100%',left:lang==='ar'?12:'auto',right:lang==='ar'?'auto':12,background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:16,padding:8,zIndex:100,boxShadow:'0 12px 40px rgba(0,0,0,.4)',minWidth:220,display:'flex',flexDirection:'column',gap:2}} className="sm:hidden">
            <div onClick={()=>{setTheme(t=>t==='dark'?'light':'dark');setMoreMenu(false);}} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 14px',borderRadius:10,cursor:'pointer',fontSize:13,fontWeight:600,color:'var(--text)'}}><span style={{fontSize:18}}>{theme==='dark'?'☀️':'🌙'}</span>{theme==='dark'?T('الوضع الفاتح','Light Mode',lang):T('الوضع الداكن','Dark Mode',lang)}</div>
            <div onClick={()=>{setLang(lang==='ar'?'en':'ar');setMoreMenu(false);}} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 14px',borderRadius:10,cursor:'pointer',fontSize:13,fontWeight:600,color:'var(--text)'}}><span style={{fontSize:18}}>🌐</span>{lang==='ar'?'English':'عربي'}</div>
            <div style={{height:1,background:'var(--border)',margin:'4px 0'}}/>
            <div onClick={()=>{handleExport();setMoreMenu(false);}} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 14px',borderRadius:10,cursor:'pointer',fontSize:13,fontWeight:600,color:'var(--text)'}}><span style={{fontSize:18}}>📤</span>{T('تصدير JSON','Export JSON',lang)}</div>
            <div onClick={()=>{setVaultOpen(true);setMoreMenu(false);}} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 14px',borderRadius:10,cursor:'pointer',fontSize:13,fontWeight:600,color:'var(--teal)'}}><span style={{fontSize:18}}>🛡️</span>{T('خزينة النسخ','Backup Vault',lang)}</div>
            <div onClick={()=>{handleImport();setMoreMenu(false);}} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 14px',borderRadius:10,cursor:'pointer',fontSize:13,fontWeight:600,color:'var(--text)'}}><span style={{fontSize:18}}>📥</span>{T('استيراد JSON','Import JSON',lang)}</div>
            <div onClick={()=>{setUploadModal(true);setMoreMenu(false);}} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 14px',borderRadius:10,cursor:'pointer',fontSize:13,fontWeight:600,color:'var(--text)'}}><span style={{fontSize:18}}>📂</span>{T('استيراد Excel','Import Excel',lang)}</div>
            <div onClick={()=>{handleCalExport();setMoreMenu(false);}} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 14px',borderRadius:10,cursor:'pointer',fontSize:13,fontWeight:600,color:'var(--text)'}}><span style={{fontSize:18}}>📅</span>{T('تصدير للتقويم','Export to Calendar',lang)}</div>
            {installPrompt&&<><div style={{height:1,background:'var(--border)',margin:'4px 0'}}/><div onClick={()=>{handleInstall();setMoreMenu(false);}} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 14px',borderRadius:10,cursor:'pointer',fontSize:13,fontWeight:700,color:'var(--coral)'}}><span style={{fontSize:18}}>📲</span>{T('ثبّت التطبيق','Install App',lang)}</div></>}
          </div>}
        </div>
      </header>
      {previewMode==='mobile'?(
        <div style={{flex:1,display:'flex',justifyContent:'center',alignItems:'flex-start',padding:'20px 12px',background:'var(--bg)',overflow:'auto'}}>
          <div className="mobile-preview">
            <div style={{flex:1,overflowY:'auto',overflowX:'hidden',background:'var(--bg)'}}>
              <div style={{padding:'36px 10px 90px',maxWidth:'100%'}}>
                <BackupBar language={lang} onExport={handleExport} onVault={()=>setVaultOpen(true)}/>
                {view!=='timeline'&&view!=='expenses'&&view!=='notes'&&view!=='meetings'&&<div style={{marginBottom:16}}><Cal language={lang} data={data} onDayClick={handleDayClick}/></div>}
                {view==='dashboard'&&<><AnalyticsDashboard data={data} language={lang}/><SearchFilter language={lang} search={search} onSearch={setSearch} filter={filter} onFilter={setFilter} tagFilter={tagFilter} onTagFilter={setTagFilter}/><Dashboard data={data} language={lang} onAdd={handleAdd} onEdit={handleEdit} onDelete={handleDelete} onStatus={handleStatus} onReorder={handleReorder} search={search} filter={filter} tagFilter={tagFilter}/></>}
                {view==='today'&&<Today data={data} language={lang} onAdd={handleAdd} onEdit={handleEdit} onDelete={handleDelete} onStatus={handleStatus} onSaveList={handleSaveList} onDeleteList={handleDeleteList}/>}
                {view==='meetings'&&<MeetingsPage data={data} language={lang} onAdd={handleAdd} onEdit={handleEdit} onDelete={handleDelete}/>}
                {view==='expenses'&&<Expenses data={data} language={lang} onSaveExpense={handleSaveExpense} onDeleteExpense={handleDeleteExpense} onSaveCategory={handleSaveCategory} onDeleteCategory={handleDeleteCategory} onSaveBudget={handleSaveBudget} onDeleteBudget={handleDeleteBudget} toast={toast}/>}
                {view==='health'&&<Health data={data} language={lang} onSaveHealth={handleSaveHealth} onDeleteHealth={handleDeleteHealth} toast={toast}/>}
                {view==='notes'&&<Notes data={data} language={lang} isDark={theme==='dark'} onSaveNote={handleSaveNote} onDeleteNote={handleDeleteNote} toast={toast}/>}
                {view==='timeline'&&<Timeline data={data} language={lang}/>}
              </div>
            </div>
            <div className="bottom-nav">{navs.map(n=>(<div key={n.id} className={`bnav-item ${view===n.id?'active':''}`} onClick={()=>setView(n.id)}><span>{n.icon}</span><span>{n.label}</span></div>))}</div>
          </div>
        </div>
      ):(
        <>
          <main className="desktop-layout" style={{flex:1,maxWidth:860,margin:'0 auto',width:'100%',padding:'16px 12px 100px'}}>
            <BackupBar language={lang} onExport={handleExport} onVault={()=>setVaultOpen(true)}/>
            {view==='dashboard'||view==='today'?(
              <div className="desk-split">
                <div className="cal-col">
                  <button className="cal-toggle" onClick={()=>setCalOpen(p=>!p)}><span style={{fontSize:18}}>📅</span><span style={{flex:1,textAlign:lang==='ar'?'right':'left'}}>{calOpen?T('إخفاء التقويم','Hide Calendar',lang):T('عرض التقويم','Show Calendar',lang)}</span><span style={{transition:'transform .2s',transform:calOpen?'rotate(180deg)':'rotate(0)'}}>▼</span></button>
                  <div className="cal-inner" style={!calOpen?{display:'none'}:{}}><Cal language={lang} data={data} onDayClick={handleDayClick}/></div>
                </div>
                <div>
                  {view==='dashboard'&&<><AnalyticsDashboard data={data} language={lang}/><SearchFilter language={lang} search={search} onSearch={setSearch} filter={filter} onFilter={setFilter} tagFilter={tagFilter} onTagFilter={setTagFilter}/><Dashboard data={data} language={lang} onAdd={handleAdd} onEdit={handleEdit} onDelete={handleDelete} onStatus={handleStatus} onReorder={handleReorder} search={search} filter={filter} tagFilter={tagFilter}/></>}
                  {view==='today'&&<Today data={data} language={lang} onAdd={handleAdd} onEdit={handleEdit} onDelete={handleDelete} onStatus={handleStatus} onSaveList={handleSaveList} onDeleteList={handleDeleteList}/>}
                </div>
              </div>
            ):view==='meetings'?(
              <MeetingsPage data={data} language={lang} onAdd={handleAdd} onEdit={handleEdit} onDelete={handleDelete}/>
            ):view==='expenses'?(
              <Expenses data={data} language={lang} onSaveExpense={handleSaveExpense} onDeleteExpense={handleDeleteExpense} onSaveCategory={handleSaveCategory} onDeleteCategory={handleDeleteCategory} onSaveBudget={handleSaveBudget} onDeleteBudget={handleDeleteBudget} toast={toast}/>
            ):view==='health'?(
              <Health data={data} language={lang} onSaveHealth={handleSaveHealth} onDeleteHealth={handleDeleteHealth} toast={toast}/>
            ):view==='notes'?(
              <Notes data={data} language={lang} isDark={theme==='dark'} onSaveNote={handleSaveNote} onDeleteNote={handleDeleteNote} toast={toast}/>
            ):(
              <Timeline data={data} language={lang}/>
            )}
          </main>
          <div className="bottom-nav">{navs.map(n=>(<div key={n.id} className={`bnav-item ${view===n.id?'active':''}`} onClick={()=>setView(n.id)}><span>{n.icon}</span><span>{n.label}</span></div>))}</div>
        </>
      )}
      <Toasts toasts={toasts} onDismiss={id=>setToasts(p=>p.filter(t=>t.id!==id))}/>
      <InAppAlerts language={lang}/>
      {view==='today'&&<Pomodoro language={lang}/>}
      {modal&&<ItemModal type={modal.type} editItem={modal.editItem} goalId={modal.goalId} milestoneId={modal.milestoneId} language={lang} onSave={handleSave} onClose={()=>setModal(null)} allTasks={data.tasks||[]} allMilestones={data.milestones||[]} allGoals={data.goals||[]}/>}
      {listModal&&<ListModal editList={listModal.id?listModal:null} language={lang} onSave={handleSaveListModal} onClose={()=>setListModal(null)}/>}
      {confirm&&<Confirm message={confirm.message} language={lang} onOk={confirm.onOk} onCancel={()=>setConfirm(null)}/>}
      {dayView&&<DayMod dateStr={dayView.dateStr} items={dayView.items} language={lang} onClose={()=>setDayView(null)} onAddTask={d=>handleAddFromDay('quickTask',d)} onAddMeeting={d=>handleAddFromDay('meeting',d)} onAddExpense={d=>{setDayView(null);setExpFromCal(d);}} onStatus={async(store,item,ns)=>{await handleStatus(store,item,ns);const ds=dayView.dateStr;const nd=await dAll('tasks'),nq=await dAll('quickTasks'),nm=await dAll('meetings');const ni=[];nd.forEach(x=>{if(x.dueDate&&x.dueDate.startsWith(ds))ni.push({...x,_type:'task'});});nq.forEach(x=>{if(x.dueDate&&x.dueDate.startsWith(ds))ni.push({...x,_type:'quickTask'});});nm.forEach(x=>{if(x.meetingDate&&x.meetingDate.startsWith(ds))ni.push({...x,_type:'meeting'});});setDayView({dateStr:ds,items:ni});}} onReorder={async(store,items)=>{await handleReorder(store,items);const ds=dayView.dateStr;const nd=await dAll('tasks'),nq=await dAll('quickTasks'),nm=await dAll('meetings');const ni=[];nd.forEach(x=>{if(x.dueDate&&x.dueDate.startsWith(ds))ni.push({...x,_type:'task'});});nq.forEach(x=>{if(x.dueDate&&x.dueDate.startsWith(ds))ni.push({...x,_type:'quickTask'});});nm.forEach(x=>{if(x.meetingDate&&x.meetingDate.startsWith(ds))ni.push({...x,_type:'meeting'});});setDayView({dateStr:ds,items:ni});}}/>}
      {expFromCal&&<ExpenseModal expense={{_isNew:true,date:expFromCal}} categories={data.categories||[]} budgets={data.budgets||[]} language={lang} onSave={async e=>{await handleSaveExpense(e);setExpFromCal(null);}} onClose={()=>setExpFromCal(null)}/>}
      {uploadModal&&<UploadModal language={lang} onImport={handleXlsxImport} onClose={()=>setUploadModal(false)}/>}
      {notifModal&&<NotifSettingsModal language={lang} toast={toast} onClose={()=>setNotifModal(false)}/>}
      {vaultOpen&&<VaultModal lang={lang} toast={toast} onClose={()=>setVaultOpen(false)} handleExport={handleExport} handleImport={handleImport} getLocalSnapshots={getLocalSnapshots} handleDownloadSnapshot={handleDownloadSnapshot} handleRestoreSnapshot={handleRestoreSnapshot} data={data} ST={ST}/>}
      {restorePrompt&&<div className="overlay"><div className="modal" onClick={e=>e.stopPropagation()} style={{maxWidth:400,textAlign:'center',padding:30}}>
        <div style={{fontSize:48,marginBottom:16}}>💾</div>
        <h3 style={{fontSize:18,fontWeight:800,marginBottom:10,color:'var(--gold)'}}>{T('تم العثور على نسخة احتياطية!','Backup Found!',lang)}</h3>
        <p style={{fontSize:13,color:'var(--text2)',marginBottom:6}}>{T('يبدو أن بياناتك حُذفت، لكن توجد نسخة احتياطية تلقائية','Your data seems deleted, but an auto-backup exists',lang)}</p>
        <div style={{background:'var(--bg3)',borderRadius:12,padding:12,marginBottom:16}}>
          <div style={{fontSize:12,fontWeight:700}}>{T('التاريخ','Date',lang)}: {restorePrompt.date?new Date(restorePrompt.date).toLocaleString(lang==='ar'?'ar-SA':'en-US'):'-'}</div>
          <div style={{fontSize:12,fontWeight:700,color:'var(--teal)'}}>{restorePrompt.count} {T('عنصر','items',lang)}</div>
        </div>
        <div style={{display:'flex',gap:10,justifyContent:'center'}}>
          <button className="btn btn-ghost" onClick={()=>setRestorePrompt(null)}>{T('تجاهل','Ignore',lang)}</button>
          <button className="btn btn-teal" onClick={handleRestore}>🔄 {T('استعادة البيانات','Restore Data',lang)}</button>
        </div>
      </div></div>}
    </div>);
}
ReactDOM.render(<App/>,document.getElementById('root'));
</script>
</body>
</html>
